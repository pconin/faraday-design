<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faraday — Research V6</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@300;400;500;600;700&family=Sora:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#faf7f2;font-family:'Inter',sans-serif;color:#1a1a1a;padding:60px 24px;padding-top:100px;}
  h1{font-size:14px;font-weight:400;letter-spacing:.15em;text-transform:uppercase;color:#999;margin-bottom:8px;}
  .desc{font-size:13px;color:#999;margin-bottom:50px;max-width:750px;line-height:1.7;}
  .sb{text-align:center;padding:50px 0 28px;border-top:1px solid #ddd;margin-top:40px;}
  .sb h2{font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:#999;}
  .sb p{font-size:12px;color:#bbb;margin-top:4px;}
  .grid{display:flex;flex-wrap:wrap;gap:18px;justify-content:center;margin-bottom:30px;}
  .lb{display:flex;flex-direction:column;align-items:center;gap:3px;}
  .lb-n{font-size:7.5px;font-weight:500;color:#bbb;font-family:'Space Grotesk',sans-serif;letter-spacing:.04em;}
  .lb-c{font-size:7px;color:#ccc;}
  .bx{width:110px;height:110px;border-radius:22px;overflow:hidden;} .bx svg{width:100%;height:100%;}
  .bx-r{border-radius:55px;}
  .bx-rect{width:170px;height:95px;border-radius:18px;} .bx-rect svg{width:100%;height:100%;}
  .lk-t{font-size:11px;font-weight:600;color:#666;margin:20px 0 12px;}
  .lk-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;justify-content:center;}
  .lk{display:flex;align-items:center;gap:11px;padding:22px 28px;border-radius:11px;min-width:260px;position:relative;}
  .lk-n{position:absolute;bottom:5px;right:9px;font-size:7px;font-weight:500;opacity:.35;font-family:'Space Grotesk',sans-serif;}
  .lk-ico{width:38px;height:38px;border-radius:9px;overflow:hidden;flex-shrink:0;} .lk-ico svg{width:100%;height:100%;}
  .lk-wm{font-size:18px;}
  .lk-bl{font-size:7.5px;letter-spacing:.2em;text-transform:uppercase;opacity:.4;margin-top:2px;font-weight:300;}
  .lk-wrap{display:flex;align-items:center;gap:0;padding:24px 30px;border-radius:11px;min-width:260px;position:relative;}
  .lk-paren{font-weight:200;opacity:.3;line-height:1;}
  .lk-wrap-text{display:flex;flex-direction:column;align-items:center;padding:0 6px;}
</style>
</head>
<body>

<h1>Faraday — Research V6</h1>
<p class="desc">
  Deep dive sur les favoris : parentheses asymetriques, rondes, rupture fade progressive, flatline original.<br>
  Paires fonce+clair. 2 couleurs. Combinaisons.
</p>

<script>
// === COLORS ===
const dark=[
  {n:'Encre',bg:'#2a2a5a',fg:'#f5f0e8'},
  {n:'Navy',bg:'#0f1a2e',fg:'#f5f0e8'},
  {n:'Foret',bg:'#1c2e1c',fg:'#f5f0e8'},
];
const light=[
  {n:'Creme',bg:'#f5f0e8',fg:'#2a2a5a'},
  {n:'Sauge clair',bg:'#dfe5d8',fg:'#1c2e1c'},
  {n:'Brume sauge',bg:'#a3b098',fg:'#0f1a2e'},
  {n:'Cuivre fond',bg:'#a07860',fg:'#f5f0e8'},
];
const all=[...dark,...light];
const accent={cuivre:'#a07860',or:'#d4b062',sauge:'#7a9a6a',teal:'#4a8a8a'};

// Typos
const T=[
  {ff:"'Sora',sans-serif",fw:'300',ls:'.12em',tt:'none',wm:'Faraday',bl:'disconnect to reconnect'},
  {ff:"'Plus Jakarta Sans',sans-serif",fw:'600',ls:'.04em',tt:'none',wm:'Faraday',bl:'the present starts here'},
  {ff:"'Space Grotesk',sans-serif",fw:'500',ls:'.18em',tt:'uppercase',wm:'Faraday',bl:'the present starts here'},
  {ff:"'Manrope',sans-serif",fw:'300',ls:'.02em',tt:'lowercase',wm:'faraday',bl:'come back to yourself'},
];

let g=1;
const N=(cn)=>`<div class="lb-n">${String(g++).padStart(3,'0')}</div><div class="lb-c">${cn}</div>`;
const NL=()=>`<div class="lk-n">${String(g++).padStart(3,'0')}</div>`;
const bdr=(c)=>c.bg>'#c'?'border:1px solid #ddd;':'';

let h='';

// === HELPER: parametric asymmetric parens ===
function asymP(s,bg,fg,bw,tw,bs,ts,to){
  // bw=bold width, tw=thin width, bs=bold span(0-1 of height), ts=thin span, to=thin opacity
  const bh=s*bs, th=s*ts, by=(s-bh)/2, ty=(s-th)/2;
  return `<svg viewBox="0 0 ${s} ${s}"><rect width="${s}" height="${s}" rx="${s*.2}" fill="${bg}"/><path d="M${s*.36},${by} Q${s*.36-s*.12},${s*.5} ${s*.36},${by+bh}" fill="none" stroke="${fg}" stroke-width="${s*bw}" stroke-linecap="round"/><path d="M${s*.64},${ty} Q${s*.64+s*.1},${s*.5} ${s*.64},${ty+th}" fill="none" stroke="${fg}" stroke-width="${s*tw}" stroke-linecap="round" opacity="${to}"/></svg>`;
}
function asymPRound(s,bg,fg,bw,tw,bs,ts,to){
  const bh=s*bs, th=s*ts, by=(s-bh)/2, ty=(s-th)/2;
  return `<svg viewBox="0 0 ${s} ${s}"><circle cx="${s*.5}" cy="${s*.5}" r="${s*.5}" fill="${bg}"/><path d="M${s*.36},${by} Q${s*.36-s*.12},${s*.5} ${s*.36},${by+bh}" fill="none" stroke="${fg}" stroke-width="${s*bw}" stroke-linecap="round"/><path d="M${s*.64},${ty} Q${s*.64+s*.1},${s*.5} ${s*.64},${ty+th}" fill="none" stroke="${fg}" stroke-width="${s*tw}" stroke-linecap="round" opacity="${to}"/></svg>`;
}
// 2-color asym
function asym2C(s,bg,fgL,fgR,bw,tw,bs,ts,to){
  const bh=s*bs, th=s*ts, by=(s-bh)/2, ty=(s-th)/2;
  return `<svg viewBox="0 0 ${s} ${s}"><rect width="${s}" height="${s}" rx="${s*.2}" fill="${bg}"/><path d="M${s*.36},${by} Q${s*.36-s*.12},${s*.5} ${s*.36},${by+bh}" fill="none" stroke="${fgL}" stroke-width="${s*bw}" stroke-linecap="round"/><path d="M${s*.64},${ty} Q${s*.64+s*.1},${s*.5} ${s*.64},${ty+th}" fill="none" stroke="${fgR}" stroke-width="${s*tw}" stroke-linecap="round" opacity="${to}"/></svg>`;
}
// Inverted asym (right bold)
function asymInv(s,bg,fg,bw,tw,bs,ts,to){
  const bh=s*bs, th=s*ts, by=(s-bh)/2, ty=(s-th)/2;
  return `<svg viewBox="0 0 ${s} ${s}"><rect width="${s}" height="${s}" rx="${s*.2}" fill="${bg}"/><path d="M${s*.36},${ty} Q${s*.36-s*.1},${s*.5} ${s*.36},${ty+th}" fill="none" stroke="${fg}" stroke-width="${s*tw}" stroke-linecap="round" opacity="${to}"/><path d="M${s*.64},${by} Q${s*.64+s*.12},${s*.5} ${s*.64},${by+bh}" fill="none" stroke="${fg}" stroke-width="${s*bw}" stroke-linecap="round"/></svg>`;
}
// Asym with dot
function asymDot(s,bg,fg,bw,tw,bs,ts,to){
  return asymP(s,bg,fg,bw,tw,bs,ts,to).replace('</svg>',`<circle cx="${s*.5}" cy="${s*.5}" r="${s*.045}" fill="${fg}"/></svg>`);
}
// Asym with straight right
function asymStraight(s,bg,fg){
  return `<svg viewBox="0 0 ${s} ${s}"><rect width="${s}" height="${s}" rx="${s*.2}" fill="${bg}"/><path d="M${s*.34},${s*.2} Q${s*.2},${s*.5} ${s*.34},${s*.8}" fill="none" stroke="${fg}" stroke-width="${s*.035}" stroke-linecap="round"/><line x1="${s*.66}" y1="${s*.3}" x2="${s*.66}" y2="${s*.7}" stroke="${fg}" stroke-width="${s*.02}" stroke-linecap="round" opacity=".45"/></svg>`;
}
// Asym dashed right
function asymDash(s,bg,fg){
  return `<svg viewBox="0 0 ${s} ${s}"><rect width="${s}" height="${s}" rx="${s*.2}" fill="${bg}"/><path d="M${s*.34},${s*.2} Q${s*.2},${s*.5} ${s*.34},${s*.8}" fill="none" stroke="${fg}" stroke-width="${s*.035}" stroke-linecap="round"/><path d="M${s*.66},${s*.28} Q${s*.78},${s*.5} ${s*.66},${s*.72}" fill="none" stroke="${fg}" stroke-width="${s*.02}" stroke-linecap="round" stroke-dasharray="${s*.03} ${s*.04}" opacity=".4"/></svg>`;
}

// Rupture fade progressive (computed arcs)
function rupFade(s,bg,fg,n,cw){
  const cx=s*.5,cy=s*.5,r=s*.28;
  const ops=[1,.72,.48,.28,.14,.06];
  const wds=[.035,.03,.025,.02,.016,.012];
  const span=55;
  let p='';
  for(let i=0;i<n;i++){
    const a1=(270+(cw?1:-1)*i*span)*Math.PI/180;
    const a2=(270+(cw?1:-1)*(i*span+span-6))*Math.PI/180;
    const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
    const x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    p+=`<path d="M${x1},${y1} A${r},${r} 0 0,${cw?1:0} ${x2},${y2}" fill="none" stroke="${fg}" stroke-width="${s*wds[i]}" stroke-linecap="round" opacity="${ops[i]}"/>`;
  }
  return `<svg viewBox="0 0 ${s} ${s}"><rect width="${s}" height="${s}" rx="${s*.18}" fill="${bg}"/>${p}</svg>`;
}
function rupFadeRound(s,bg,fg,n,cw){
  const cx=s*.5,cy=s*.5,r=s*.28;
  const ops=[1,.72,.48,.28,.14,.06];
  const wds=[.035,.03,.025,.02,.016,.012];
  const span=55;
  let p='';
  for(let i=0;i<n;i++){
    const a1=(270+(cw?1:-1)*i*span)*Math.PI/180;
    const a2=(270+(cw?1:-1)*(i*span+span-6))*Math.PI/180;
    const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
    const x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    p+=`<path d="M${x1},${y1} A${r},${r} 0 0,${cw?1:0} ${x2},${y2}" fill="none" stroke="${fg}" stroke-width="${s*wds[i]}" stroke-linecap="round" opacity="${ops[i]}"/>`;
  }
  return `<svg viewBox="0 0 ${s} ${s}"><circle cx="${s*.5}" cy="${s*.5}" r="${s*.5}" fill="${bg}"/>${p}</svg>`;
}

// Flatline original
function flat(s,bg,fg,sw){return `<svg viewBox="0 0 ${s} ${s}"><rect width="${s}" height="${s}" rx="${s*.18}" fill="${bg}"/><path d="M${s*.15},${s*.5} Q${s*.25},${s*.3} ${s*.35},${s*.5} Q${s*.4},${s*.6} ${s*.46},${s*.5} Q${s*.5},${s*.42} ${s*.54},${s*.5} L${s*.85},${s*.5}" fill="none" stroke="${fg}" stroke-width="${s*(sw||.035)}" stroke-linecap="round"/></svg>`;}
function flatDot(s,bg,fg){return flat(s,bg,fg).replace('</svg>',`<circle cx="${s*.54}" cy="${s*.5}" r="${s*.03}" fill="${fg}"/></svg>`);}
function flatCenter(s,bg,fg){return `<svg viewBox="0 0 ${s} ${s}"><rect width="${s}" height="${s}" rx="${s*.18}" fill="${bg}"/><path d="M${s*.08},${s*.5} L${s*.32},${s*.5} Q${s*.4},${s*.32} ${s*.5},${s*.5} Q${s*.6},${s*.66} ${s*.68},${s*.5} L${s*.92},${s*.5}" fill="none" stroke="${fg}" stroke-width="${s*.035}" stroke-linecap="round"/></svg>`;}
function flat2C(s,bg,fg1,fg2){return `<svg viewBox="0 0 ${s} ${s}"><rect width="${s}" height="${s}" rx="${s*.18}" fill="${bg}"/><path d="M${s*.15},${s*.5} Q${s*.25},${s*.3} ${s*.35},${s*.5} Q${s*.4},${s*.6} ${s*.46},${s*.5} Q${s*.5},${s*.42} ${s*.54},${s*.5}" fill="none" stroke="${fg1}" stroke-width="${s*.035}" stroke-linecap="round"/><line x1="${s*.54}" y1="${s*.5}" x2="${s*.85}" y2="${s*.5}" stroke="${fg2}" stroke-width="${s*.02}" stroke-linecap="round" opacity=".4"/></svg>`;}

// Paren + flatline combo
function parenFlat(s,bg,fg){return `<svg viewBox="0 0 ${s} ${s}"><rect width="${s}" height="${s}" rx="${s*.18}" fill="${bg}"/><path d="M${s*.24},${s*.25} Q${s*.14},${s*.5} ${s*.24},${s*.75}" fill="none" stroke="${fg}" stroke-width="${s*.035}" stroke-linecap="round"/><path d="M${s*.36},${s*.5} Q${s*.42},${s*.35} ${s*.48},${s*.5} Q${s*.52},${s*.56} ${s*.56},${s*.5} L${s*.85},${s*.5}" fill="none" stroke="${fg}" stroke-width="${s*.025}" stroke-linecap="round" opacity=".6"/></svg>`;}
// Rupture + flatline
function rupFlat(s,bg,fg){
  const cx=s*.35,cy=s*.5,r=s*.2;
  return `<svg viewBox="0 0 ${s} ${s}"><rect width="${s}" height="${s}" rx="${s*.18}" fill="${bg}"/><path d="M${cx},${cy-r} A${r},${r} 0 1,0 ${cx+r*.7},${cy+r*.7}" fill="none" stroke="${fg}" stroke-width="${s*.03}" stroke-linecap="round" opacity=".7"/><line x1="${cx+r*.7}" y1="${cy+r*.7}" x2="${s*.88}" y2="${cy+r*.7}" stroke="${fg}" stroke-width="${s*.02}" stroke-linecap="round" opacity=".3"/></svg>`;
}
// Paren + dot final
function parenDotFinal(s,bg,fg){return `<svg viewBox="0 0 ${s} ${s}"><rect width="${s}" height="${s}" rx="${s*.18}" fill="${bg}"/><path d="M${s*.3},${s*.24} Q${s*.18},${s*.5} ${s*.3},${s*.76}" fill="none" stroke="${fg}" stroke-width="${s*.03}" stroke-linecap="round"/><path d="M${s*.58},${s*.24} Q${s*.7},${s*.5} ${s*.58},${s*.76}" fill="none" stroke="${fg}" stroke-width="${s*.02}" stroke-linecap="round" opacity=".45"/><circle cx="${s*.72}" cy="${s*.7}" r="${s*.04}" fill="${fg}" opacity=".7"/></svg>`;}

// ============================================================
// A. ASYMMETRIC PARENS
// ============================================================
h+=`<div class="sb" style="border:none;padding-top:0;"><h2>A. Parentheses asymetriques — deep dive</h2><p>5 ratios, carres et ronds, variantes speciales, 2 couleurs</p></div>`;

// 5 ratios × 3 dark colors (square)
const ratios=[
  {bw:.04,tw:.018,bs:.6,ts:.42,to:.4,nm:'Forte'},
  {bw:.035,tw:.02,bs:.58,ts:.44,to:.5,nm:'Marquee'},
  {bw:.035,tw:.025,bs:.56,ts:.48,to:.55,nm:'Douce'},
  {bw:.03,tw:.015,bs:.62,ts:.38,to:.35,nm:'Extreme'},
  {bw:.038,tw:.022,bs:.54,ts:.5,to:.45,nm:'Equilibree'},
];
h+=`<div class="lk-t">Carres — 5 ratios × fonces</div><div class="grid">`;
ratios.forEach(r=>{dark.forEach(c=>{h+=`<div class="lb"><div class="bx">${asymP(110,c.bg,c.fg,r.bw,r.tw,r.bs,r.ts,r.to)}</div>${N(r.nm+' — '+c.n)}</div>`;});});
h+=`</div>`;

// Same in round
h+=`<div class="lk-t">Ronds — 5 ratios × fonces</div><div class="grid">`;
ratios.forEach(r=>{dark.forEach(c=>{h+=`<div class="lb"><div class="bx bx-r">${asymPRound(110,c.bg,c.fg,r.bw,r.tw,r.bs,r.ts,r.to)}</div>${N(r.nm+' — '+c.n)}</div>`;});});
h+=`</div>`;

// On light backgrounds
h+=`<div class="lk-t">Fonds clairs</div><div class="grid">`;
light.forEach(c=>{ratios.slice(0,3).forEach(r=>{h+=`<div class="lb"><div class="bx" style="${bdr(c)}">${asymP(110,c.bg,c.fg,r.bw,r.tw,r.bs,r.ts,r.to)}</div>${N(r.nm+' — '+c.n)}</div>`;});});
h+=`</div>`;

// Speciales
h+=`<div class="lk-t">Speciales : inversees, tirets, droite, point</div><div class="grid">`;
dark.forEach(c=>{
  h+=`<div class="lb"><div class="bx">${asymInv(110,c.bg,c.fg,.04,.018,.6,.42,.4)}</div>${N('Inversee — '+c.n)}</div>`;
  h+=`<div class="lb"><div class="bx">${asymDash(110,c.bg,c.fg)}</div>${N('Tirets — '+c.n)}</div>`;
  h+=`<div class="lb"><div class="bx">${asymStraight(110,c.bg,c.fg)}</div>${N('Droite — '+c.n)}</div>`;
  h+=`<div class="lb"><div class="bx">${asymDot(110,c.bg,c.fg,.035,.02,.58,.42,.45)}</div>${N('Point — '+c.n)}</div>`;
});
h+=`</div>`;

// 2-color
h+=`<div class="lk-t">2 couleurs : paren gauche + accent droit</div><div class="grid">`;
dark.forEach(c=>{
  Object.entries(accent).forEach(([an,ac])=>{
    h+=`<div class="lb"><div class="bx">${asym2C(110,c.bg,c.fg,ac,.035,.025,.58,.44,.7)}</div>${N(c.n+' + '+an)}</div>`;
  });
});
h+=`</div>`;

// Lockups
h+=`<div class="lk-t">Lockups asymetriques</div>`;
T.forEach((t,ti)=>{
  h+=`<div class="lk-row">`;
  const cols=[dark[ti%3],light[0],dark[(ti+1)%3],light[1],light[2],dark[(ti+2)%3]];
  cols.forEach(c=>{
    h+=`<div class="lk" style="background:${c.bg};color:${c.fg};${bdr(c)}">${NL()}<div class="lk-ico">${asymP(38,c.bg,c.fg,.035,.02,.58,.42,.45)}</div><div><div class="lk-wm" style="font-family:${t.ff};font-weight:${t.fw};letter-spacing:${t.ls};text-transform:${t.tt};">${t.wm}</div><div class="lk-bl">${t.bl}</div></div></div>`;
  });
  h+=`</div>`;
});

// ( Faraday ) wraps
h+=`<div class="lk-t">Wraps — ( texte ) asymetriques</div>`;
T.slice(0,3).forEach((t,ti)=>{
  h+=`<div class="lk-row">`;
  [dark[0],dark[1],dark[2],light[0],light[1],light[3]].forEach(c=>{
    const psz=t.tt==='uppercase'?'30px':'36px';
    h+=`<div class="lk-wrap" style="background:${c.bg};color:${c.fg};${bdr(c)}">${NL()}<div class="lk-paren" style="font-family:${t.ff};font-size:${psz};">(</div><div class="lk-wrap-text"><div class="lk-wm" style="font-family:${t.ff};font-weight:${t.fw};font-size:16px;letter-spacing:${t.ls};text-transform:${t.tt};">${t.wm}</div><div class="lk-bl">${t.bl}</div></div><div class="lk-paren" style="font-family:${t.ff};font-size:${psz};opacity:.15;">)</div></div>`;
  });
  h+=`</div>`;
});


// ============================================================
// B. RONDES
// ============================================================
h+=`<div class="sb"><h2>B. Rondes — epaisseurs et ouvertures</h2></div>`;
function parenR(s,bg,fg,sw,arc){
  const a=arc||.55;
  return `<svg viewBox="0 0 ${s} ${s}"><circle cx="${s*.5}" cy="${s*.5}" r="${s*.5}" fill="${bg}"/><path d="M${s*.36},${s*(.5-a*.45)} Q${s*.24},${s*.5} ${s*.36},${s*(.5+a*.45)}" fill="none" stroke="${fg}" stroke-width="${s*sw}" stroke-linecap="round"/><path d="M${s*.64},${s*(.5-a*.45)} Q${s*.76},${s*.5} ${s*.64},${s*(.5+a*.45)}" fill="none" stroke="${fg}" stroke-width="${s*sw}" stroke-linecap="round"/></svg>`;
}
h+=`<div class="grid">`;
[.018,.025,.035,.05].forEach(sw=>{
  const nm=['Ultra-fine','Fine','Medium','Epaisse'][[.018,.025,.035,.05].indexOf(sw)];
  all.forEach(c=>{h+=`<div class="lb"><div class="bx bx-r" style="${bdr(c)}">${parenR(110,c.bg,c.fg,sw)}</div>${N(nm+' — '+c.n)}</div>`;});
});
// Ouvertures
[.4,.55,.75].forEach(arc=>{
  const nm=['Etroite','Standard','Large'][[.4,.55,.75].indexOf(arc)];
  dark.forEach(c=>{h+=`<div class="lb"><div class="bx bx-r">${parenR(110,c.bg,c.fg,.03,arc)}</div>${N(nm+' — '+c.n)}</div>`;});
});
// Avec point
dark.forEach(c=>{h+=`<div class="lb"><div class="bx bx-r">${parenR(110,c.bg,c.fg,.03).replace('</svg>',`<circle cx="${110*.5}" cy="${110*.5}" r="${110*.04}" fill="${c.fg}"/></svg>`)}</div>${N('Point — '+c.n)}</div>`;});
// 2-color round
dark.forEach(c=>{h+=`<div class="lb"><div class="bx bx-r">${`<svg viewBox="0 0 110 110"><circle cx="55" cy="55" r="55" fill="${c.bg}"/><path d="M40,22 Q22,55 40,88" fill="none" stroke="${c.fg}" stroke-width="3.5" stroke-linecap="round"/><path d="M70,22 Q88,55 70,88" fill="none" stroke="${accent.cuivre}" stroke-width="2.5" stroke-linecap="round" opacity=".7"/></svg>`}</div>${N('2C cuivre — '+c.n)}</div>`;});
h+=`</div>`;

// Lockups ronds
h+=`<div class="lk-t">Lockups ronds</div>`;
T.slice(0,3).forEach((t,ti)=>{
  h+=`<div class="lk-row">`;
  [dark[0],dark[1],dark[2],light[0],light[2],light[3]].forEach(c=>{
    h+=`<div class="lk" style="background:${c.bg};color:${c.fg};${bdr(c)}">${NL()}<div class="lk-ico" style="border-radius:50%;"><div style="width:100%;height:100%;overflow:hidden;border-radius:50%;">${parenR(38,c.bg,c.fg,.03)}</div></div><div><div class="lk-wm" style="font-family:${t.ff};font-weight:${t.fw};letter-spacing:${t.ls};text-transform:${t.tt};">${t.wm}</div><div class="lk-bl">${t.bl}</div></div></div>`;
  });
  h+=`</div>`;
});


// ============================================================
// C. RUPTURE FADE PROGRESSIVE
// ============================================================
h+=`<div class="sb"><h2>C. Rupture Fade progressive</h2><p>5-6 arcs, decroissance douce, sens et departs varies</p></div>`;
h+=`<div class="grid">`;
// 6 arcs CW × colors
all.forEach(c=>{h+=`<div class="lb"><div class="bx" style="${bdr(c)}">${rupFade(110,c.bg,c.fg,6,true)}</div>${N('6 arcs CW — '+c.n)}</div>`;});
// 6 arcs CCW
dark.forEach(c=>{h+=`<div class="lb"><div class="bx">${rupFade(110,c.bg,c.fg,6,false)}</div>${N('6 arcs CCW — '+c.n)}</div>`;});
// 5 arcs
dark.forEach(c=>{h+=`<div class="lb"><div class="bx">${rupFade(110,c.bg,c.fg,5,true)}</div>${N('5 arcs — '+c.n)}</div>`;});
// Round
dark.forEach(c=>{h+=`<div class="lb"><div class="bx bx-r">${rupFadeRound(110,c.bg,c.fg,6,true)}</div>${N('Rond — '+c.n)}</div>`;});
h+=`</div>`;

// Lockups
h+=`<div class="lk-t">Lockups Rupture Fade</div>`;
T.slice(0,3).forEach((t,ti)=>{
  h+=`<div class="lk-row">`;
  [dark[0],dark[1],dark[2],light[0],light[1],light[3]].forEach(c=>{
    h+=`<div class="lk" style="background:${c.bg};color:${c.fg};${bdr(c)}">${NL()}<div class="lk-ico">${rupFade(38,c.bg,c.fg,6,true)}</div><div><div class="lk-wm" style="font-family:${t.ff};font-weight:${t.fw};letter-spacing:${t.ls};text-transform:${t.tt};">${t.wm}</div><div class="lk-bl">${t.bl}</div></div></div>`;
  });
  h+=`</div>`;
});


// ============================================================
// D. FLATLINE ORIGINAL RAFFINE
// ============================================================
h+=`<div class="sb"><h2>D. Flatline Original — raffine</h2><p>Variations de poids, centre, point, 2 couleurs</p></div>`;
h+=`<div class="grid">`;
// Weights
[.025,.035,.045].forEach((sw,wi)=>{
  const nm=['Thin','Regular','Bold'][wi];
  all.forEach(c=>{h+=`<div class="lb"><div class="bx" style="${bdr(c)}">${flat(110,c.bg,c.fg,sw)}</div>${N(nm+' — '+c.n)}</div>`;});
});
// Center
dark.forEach(c=>{h+=`<div class="lb"><div class="bx">${flatCenter(110,c.bg,c.fg)}</div>${N('Centre — '+c.n)}</div>`;});
// Dot transition
dark.forEach(c=>{h+=`<div class="lb"><div class="bx">${flatDot(110,c.bg,c.fg)}</div>${N('Point — '+c.n)}</div>`;});
// 2-color
dark.forEach(c=>{h+=`<div class="lb"><div class="bx">${flat2C(110,c.bg,c.fg,accent.cuivre)}</div>${N('2C cuivre — '+c.n)}</div>`;});
dark.forEach(c=>{h+=`<div class="lb"><div class="bx">${flat2C(110,c.bg,c.fg,accent.sauge)}</div>${N('2C sauge — '+c.n)}</div>`;});
h+=`</div>`;

// Lockups
h+=`<div class="lk-t">Lockups Flatline</div>`;
T.slice(0,3).forEach((t,ti)=>{
  h+=`<div class="lk-row">`;
  [dark[0],dark[1],dark[2],light[0],light[1],light[3]].forEach(c=>{
    h+=`<div class="lk" style="background:${c.bg};color:${c.fg};${bdr(c)}">${NL()}<div class="lk-ico">${flat(38,c.bg,c.fg)}</div><div><div class="lk-wm" style="font-family:${t.ff};font-weight:${t.fw};letter-spacing:${t.ls};text-transform:${t.tt};">${t.wm}</div><div class="lk-bl">${t.bl}</div></div></div>`;
  });
  h+=`</div>`;
});


// ============================================================
// E. 2 COULEURS
// ============================================================
h+=`<div class="sb"><h2>E. Explorations 2 couleurs</h2><p>Paires fonce+clair, accents, split-color</p></div>`;

// Split-color parens
h+=`<div class="lk-t">Parens split-color</div><div class="grid">`;
const pairs=[[dark[0],accent.cuivre],[dark[1],accent.or],[dark[2],accent.sauge],[dark[0],accent.teal],[dark[1],'#a3b098'],[dark[2],'#a07860']];
pairs.forEach(([c,ac])=>{
  h+=`<div class="lb"><div class="bx">${asym2C(110,c.bg,c.fg,ac,.035,.028,.58,.44,.7)}</div>${N(c.n+' + accent')}</div>`;
  h+=`<div class="lb"><div class="bx bx-r">${`<svg viewBox="0 0 110 110"><circle cx="55" cy="55" r="55" fill="${c.bg}"/><path d="M40,22 Q22,55 40,88" fill="none" stroke="${c.fg}" stroke-width="3.5" stroke-linecap="round"/><path d="M70,22 Q88,55 70,88" fill="none" stroke="${ac}" stroke-width="2.5" stroke-linecap="round" opacity=".7"/></svg>`}</div>${N(c.n+' + accent rond')}</div>`;
});
h+=`</div>`;

// Fond clair + symbole foncé
h+=`<div class="lk-t">Fond clair + symbole fonce — lockups</div><div class="lk-row">`;
[[light[0],dark[0]],[light[1],dark[2]],[light[2],dark[1]],[light[3],dark[0]],[light[0],dark[2]],[light[1],dark[0]]].forEach(([c,d])=>{
  const t=T[0];
  h+=`<div class="lk" style="background:${c.bg};color:${c.fg};${bdr(c)}">${NL()}<div class="lk-ico">${asymP(38,c.bg,c.fg,.035,.02,.58,.42,.45)}</div><div><div class="lk-wm" style="font-family:${t.ff};font-weight:${t.fw};letter-spacing:${t.ls};text-transform:${t.tt};">${t.wm}</div><div class="lk-bl">${t.bl}</div></div></div>`;
});
h+=`</div>`;
// Accent cuivre lockups
h+=`<div class="lk-t">Accent cuivre dans lockup</div><div class="lk-row">`;
dark.forEach(c=>{
  T.slice(0,2).forEach(t=>{
    h+=`<div class="lk" style="background:${c.bg};color:${c.fg};">${NL()}<div class="lk-ico">${asym2C(38,c.bg,c.fg,accent.cuivre,.035,.025,.58,.44,.7)}</div><div><div class="lk-wm" style="font-family:${t.ff};font-weight:${t.fw};letter-spacing:${t.ls};text-transform:${t.tt};">${t.wm}</div><div class="lk-bl">${t.bl}</div></div></div>`;
  });
});
h+=`</div>`;


// ============================================================
// F. COMBINAISONS
// ============================================================
h+=`<div class="sb"><h2>F. Combinaisons</h2><p>Paren+flatline, rupture+flatline, paren+point final</p></div>`;
h+=`<div class="grid">`;
all.forEach(c=>{h+=`<div class="lb"><div class="bx" style="${bdr(c)}">${parenFlat(110,c.bg,c.fg)}</div>${N('Paren+flat — '+c.n)}</div>`;});
dark.forEach(c=>{h+=`<div class="lb"><div class="bx">${rupFlat(110,c.bg,c.fg)}</div>${N('Rup+flat — '+c.n)}</div>`;});
all.forEach(c=>{h+=`<div class="lb"><div class="bx" style="${bdr(c)}">${parenDotFinal(110,c.bg,c.fg)}</div>${N('Paren+point — '+c.n)}</div>`;});
h+=`</div>`;

// Combo lockups
h+=`<div class="lk-t">Lockups Combinaisons</div>`;
[parenFlat,rupFlat,parenDotFinal].forEach((fn,fi)=>{
  const nm=['Paren+Flat','Rup+Flat','Paren+Point'][fi];
  h+=`<div class="lk-row">`;
  [dark[0],dark[1],dark[2],light[0],light[1],light[3]].forEach((c,i)=>{
    const t=T[i%T.length];
    h+=`<div class="lk" style="background:${c.bg};color:${c.fg};${bdr(c)}">${NL()}<div class="lk-ico">${fn(38,c.bg,c.fg)}</div><div><div class="lk-wm" style="font-family:${t.ff};font-weight:${t.fw};letter-spacing:${t.ls};text-transform:${t.tt};">${t.wm}</div><div class="lk-bl">${t.bl}</div></div></div>`;
  });
  h+=`</div>`;
});

h+=`<div style="text-align:center;padding:40px 0;font-size:12px;color:#999;">Total : <strong style="font-family:'Space Grotesk',sans-serif;">${g-1}</strong> propositions numerotees</div>`;

document.write(h);
</script>
