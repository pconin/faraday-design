*{margin:0;padding:0;box-sizing:border-box;}

.desc{font-size:13px;color:#999;margin-bottom:50px;max-width:700px;line-height:1.7;}

.section{margin-top:50px;padding-top:40px;border-top:1px solid #ddd;}
.section h2{font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:#999;margin-bottom:30px;text-align:center;}

.row{display:flex;flex-direction:column;gap:14px;margin-bottom:24px;align-items:center;}
.pair{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
.lk{display:flex;align-items:center;gap:14px;padding:28px 36px;border-radius:14px;min-width:320px;position:relative;}
.lk-num{position:absolute;top:6px;right:10px;font-size:8px;font-weight:500;opacity:.4;font-family:'Space Grotesk',sans-serif;}
.lk-ico{width:46px;height:46px;border-radius:11px;overflow:hidden;flex-shrink:0;}
.lk-ico.round{border-radius:50%;}
.lk-ico svg{width:100%;height:100%;}
.lk-wm-up{font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:18px;letter-spacing:.18em;text-transform:uppercase;}
.lk-wm-low{font-family:'Manrope',sans-serif;font-weight:300;font-size:22px;letter-spacing:.02em;text-transform:lowercase;}
.lk-bl{font-size:8px;letter-spacing:.2em;text-transform:uppercase;opacity:.4;margin-top:3px;font-weight:300;}

.bdr-light{border:1px solid #ddd;}

/* Wraps (parens around text) */
.wrap{display:flex;align-items:center;gap:0;padding:30px 36px;border-radius:14px;min-width:320px;position:relative;}
.wrap-paren{font-weight:200;line-height:1;}
.wrap-text{display:flex;flex-direction:column;align-items:center;padding:0 8px;}
.wrap .lk-num{top:6px;right:10px;}
</style>
</head>

function isLight(bg){return bg && bg.toLowerCase()>'#c';}

function fixSvgSize(svg) {
  // Make svg fill its container
  return svg.replace(/<svg /, '<svg preserveAspectRatio="xMidYMid meet" ');
}

function renderItem(item) {
  const bdr = isLight(item.bg) ? 'bdr-light' : '';
  let html = '';

  if (item.isWrap) {
    // Wrap version: show ( faraday ) twice with up + low
    const wrap = item.raw;
    // Extract paren style from raw
    const parenMatch = wrap.match(/font-family:([^;"]+);font-size:(\d+px)/);
    const ff = parenMatch ? parenMatch[1] : "'Sora',sans-serif";
    const psz = '36px';
    // UP version
    html += '<div class="wrap ' + bdr + '" style="background:' + item.bg + ';color:' + item.fg + ';">' +
      '<div class="lk-num">' + String(item.num).padStart(3,'0') + '</div>' +
      '<div class="wrap-paren" style="font-family:' + ff + ';font-size:' + psz + ';opacity:.4;">(</div>' +
      '<div class="wrap-text"><div class="lk-wm-up">Faraday</div><div class="lk-bl">disconnect to reconnect</div></div>' +
      '<div class="wrap-paren" style="font-family:' + ff + ';font-size:' + psz + ';opacity:.15;">)</div>' +
      '</div>';
    // LOW version
    html += '<div class="wrap ' + bdr + '" style="background:' + item.bg + ';color:' + item.fg + ';">' +
      '<div class="lk-num">' + String(item.num).padStart(3,'0') + '</div>' +
      '<div class="wrap-paren" style="font-family:' + ff + ';font-size:' + psz + ';opacity:.4;">(</div>' +
      '<div class="wrap-text"><div class="lk-wm-low">faraday</div><div class="lk-bl">disconnect to reconnect</div></div>' +
      '<div class="wrap-paren" style="font-family:' + ff + ';font-size:' + psz + ';opacity:.15;">)</div>' +
      '</div>';
    return html;
  }

  if (!item.svg) return '';
  const svg = fixSvgSize(item.svg);
  const round = item.isRound ? 'round' : '';

  // Uppercase lockup
  html += '<div class="lk ' + bdr + '" style="background:' + item.bg + ';color:' + item.fg + ';">' +
    '<div class="lk-num">' + String(item.num).padStart(3,'0') + '</div>' +
    '<div class="lk-ico ' + round + '">' + svg + '</div>' +
    '<div><div class="lk-wm-up">FARADAY</div><div class="lk-bl">disconnect to reconnect</div></div>' +
    '</div>';
  // Lowercase lockup
  html += '<div class="lk ' + bdr + '" style="background:' + item.bg + ';color:' + item.fg + ';">' +
    '<div class="lk-num">' + String(item.num).padStart(3,'0') + '</div>' +
    '<div class="lk-ico ' + round + '">' + svg + '</div>' +
    '<div><div class="lk-wm-low">faraday</div><div class="lk-bl">disconnect to reconnect</div></div>' +
    '</div>';
  return html;
}

let out = '';
items.forEach(section => {
  out += '<div class="section"><h2>' + section.source + '</h2>';
  section.items.forEach(item => {
    out += '<div class="row"><div class="pair">' + renderItem(item) + '</div></div>';
  });
  out += '</div>';
});

document.write(out);
</script>
