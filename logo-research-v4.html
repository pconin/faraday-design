    svg:(s,b,f)=>`<svg viewBox="0 0 ${s} ${s}"><rect width="${s}" height="${s}" rx="${s*.18}" fill="${b}"/><rect x="${s*.18}" y="${s*.3}" width="${s*.08}" height="${s*.4}" rx="${s*.02}" fill="${f}"/><rect x="${s*.32}" y="${s*.36}" width="${s*.08}" height="${s*.34}" rx="${s*.02}" fill="${f}" opacity=".7"/><rect x="${s*.46}" y="${s*.42}" width="${s*.08}" height="${s*.28}" rx="${s*.02}" fill="${f}" opacity=".4"/><rect x="${s*.6}" y="${s*.46}" width="${s*.08}" height="${s*.24}" rx="${s*.02}" fill="${f}" opacity=".2"/><rect x="${s*.74}" y="${s*.48}" width="${s*.08}" height="${s*.22}" rx="${s*.02}" fill="${f}" opacity=".08"/></svg>`},
  {n:'Noeud',d:'Deux lignes croisees — le moment de transition',
    svg:(s,b,f)=>`<svg viewBox="0 0 ${s} ${s}"><rect width="${s}" height="${s}" rx="${s*.18}" fill="${b}"/><line x1="${s*.2}" y1="${s*.4}" x2="${s*.8}" y2="${s*.6}" stroke="${f}" stroke-width="${s*.025}" stroke-linecap="round"/><line x1="${s*.2}" y1="${s*.6}" x2="${s*.8}" y2="${s*.4}" stroke="${f}" stroke-width="${s*.025}" stroke-linecap="round" opacity=".4"/></svg>`},
  {n:'Porte',d:'Rectangle avec ouverture — seuil',
    svg:(s,b,f)=>`<svg viewBox="0 0 ${s} ${s}"><rect width="${s}" height="${s}" rx="${s*.18}" fill="${b}"/><rect x="${s*.3}" y="${s*.25}" width="${s*.4}" height="${s*.5}" rx="${s*.03}" fill="none" stroke="${f}" stroke-width="${s*.025}"/><line x1="${s*.3}" y1="${s*.5}" x2="${s*.42}" y2="${s*.5}" stroke="${f}" stroke-width="${s*.025}" opacity=".4"/></svg>`},
  {n:'Empreinte Doigt',d:'Lignes paralleles courbes',
    svg:(s,b,f)=>`<svg viewBox="0 0 ${s} ${s}"><rect width="${s}" height="${s}" rx="${s*.18}" fill="${b}"/><path d="M${s*.3},${s*.65} Q${s*.3},${s*.3} ${s*.5},${s*.3} Q${s*.7},${s*.3} ${s*.7},${s*.65}" fill="none" stroke="${f}" stroke-width="${s*.02}" opacity=".25"/><path d="M${s*.36},${s*.62} Q${s*.36},${s*.36} ${s*.5},${s*.36} Q${s*.64},${s*.36} ${s*.64},${s*.62}" fill="none" stroke="${f}" stroke-width="${s*.02}" opacity=".45"/><path d="M${s*.42},${s*.6} Q${s*.42},${s*.42} ${s*.5},${s*.42} Q${s*.58},${s*.42} ${s*.58},${s*.6}" fill="none" stroke="${f}" stroke-width="${s*.02}" opacity=".7"/></svg>`},
];

// ============================================================
// RENDER
// ============================================================

function renderSection(containerId, marks, cols) {
  const el = document.getElementById(containerId);
  let h = '';
  marks.forEach((m, i) => {
    const c = cols[i % cols.length];
    h += `<div class="bl"><div class="bx">${m.svg(110, c.bg, c.fg)}</div><div class="nm">${m.n}</div><div class="ds">${m.d}</div></div>`;
  });
  el.innerHTML = h;
}

// Flatline section
document.write('<div class="sb" style="border:none;padding-top:0;"><h2>Variations Flatline — 16 declinaisons</h2><p>La meme idee (onde qui meurt) exploree sous toutes ses formes</p></div>');
document.write('<div class="grid" id="g-flat"></div>');

// Flatline lockups
document.write('<div class="sb"><h2>Flatline Lockups — les meilleures en contexte</h2></div>');
document.write('<div class="lockup-section" id="g-flat-lk"></div>');

// Abstract marks
document.write('<div class="sb"><h2>Formes abstraites — 24 propositions</h2><p>Sans lettre, sans sigle. Des formes pures qui portent le sens.</p></div>');
document.write('<div class="grid" id="g-abs"></div>');

// Abstract lockups
document.write('<div class="sb"><h2>Abstraits Lockups — en contexte</h2></div>');
document.write('<div class="lockup-section" id="g-abs-lk"></div>');

// Render grids
const flatCols = [colors[0],colors[1],colors[2],colors[3],colors[4],colors[5],colors[6],colors[7],colors[8],colors[9],colors[10],colors[11],colors[0],colors[2],colors[5],colors[3]];
renderSection('g-flat', flatlines, flatCols);

const absCols = [];
for(let i=0;i<abstracts.length;i++) absCols.push(colors[i%colors.length]);
renderSection('g-abs', abstracts, absCols);

// Lockups for best flatlines
const bestFlat = [0,3,4,6,7,9,10,12];
const flatLkEl = document.getElementById('g-flat-lk');
let flh = '';
const typos = [
  {ff:"'Sora',sans-serif",fw:'300',ls:'.12em',tt:'none',wm:'Faraday',bl:'disconnect to reconnect'},
  {ff:"'Plus Jakarta Sans',sans-serif",fw:'600',ls:'.04em',tt:'none',wm:'Faraday',bl:'the present starts here'},
  {ff:"'Space Grotesk',sans-serif",fw:'500',ls:'.2em',tt:'uppercase',wm:'Faraday',bl:'the present starts here'},
  {ff:"'Manrope',sans-serif",fw:'300',ls:'.02em',tt:'lowercase',wm:'faraday',bl:'come back to yourself'},
];
bestFlat.forEach((fi,i) => {
  const m = flatlines[fi];
  const t = typos[i%typos.length];
  const lkColors = [colors[0],colors[1],colors[2],colors[4],colors[5],colors[7]];
  flh += `<div class="lk-title">${m.n}</div><div class="lk-row">`;
  lkColors.forEach(c => {
    flh += `<div class="lk" style="background:${c.bg};color:${c.fg};"><div class="lk-ico">${m.svg(42,c.bg,c.fg)}</div><div><div class="lk-wm" style="font-family:${t.ff};font-weight:${t.fw};font-size:20px;letter-spacing:${t.ls};text-transform:${t.tt};">${t.wm}</div><div class="lk-bl">${t.bl}</div></div></div>`;
  });
  flh += '</div>';
});
flatLkEl.innerHTML = flh;

// Lockups for best abstracts
const bestAbs = [0,1,5,6,7,15,16,19];
const absLkEl = document.getElementById('g-abs-lk');
let alh = '';
bestAbs.forEach((ai,i) => {
  const m = abstracts[ai];
  const t = typos[i%typos.length];
  const lkColors = [colors[0],colors[2],colors[3],colors[5],colors[6],colors[10]];
  alh += `<div class="lk-title">${m.n}</div><div class="lk-row">`;
  lkColors.forEach(c => {
    alh += `<div class="lk" style="background:${c.bg};color:${c.fg};"><div class="lk-ico">${m.svg(42,c.bg,c.fg)}</div><div><div class="lk-wm" style="font-family:${t.ff};font-weight:${t.fw};font-size:20px;letter-spacing:${t.ls};text-transform:${t.tt};">${t.wm}</div><div class="lk-bl">${t.bl}</div></div></div>`;
  });
  alh += '</div>';
});
absLkEl.innerHTML = alh;
</script>
