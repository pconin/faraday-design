<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faraday — Bannières Réseaux Sociaux</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Sora:wght@300;400;600;700&family=Manrope:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --sage:#C5CFBF;--ink:#151D2A;--porcelain:#F6F3EC;--lake:#4A8395;--ember:#FF9361;
    --muted:#69717a;--line:rgba(17,22,29,.1);--paper:rgba(255,255,255,.72);
  }
  body{margin:0;color:var(--ink);font-family:'Manrope',sans-serif;background:var(--porcelain);}
  .page{width:min(1280px,calc(100% - 48px));margin:0 auto;padding:40px 0 80px;}
  .sect{margin-top:32px;padding:32px;border-radius:28px;border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(255,255,255,.54));}
  .sect-dark{background:linear-gradient(180deg,rgba(21,29,42,.97),rgba(21,29,42,.94));color:var(--porcelain);border-color:rgba(255,255,255,.06);}
  .kicker{display:inline-flex;padding:8px 12px;border-radius:999px;background:rgba(17,22,29,.06);font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#34404d;}
  .sect-dark .kicker{background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);}
  h2{margin:14px 0 10px;font-family:'Sora',sans-serif;font-size:clamp(28px,4vw,48px);line-height:.98;letter-spacing:-.04em;font-weight:700;}
  .sect-desc{font-size:16px;line-height:1.7;color:var(--muted);max-width:600px;margin-bottom:28px;}
  .sect-dark .sect-desc{color:rgba(255,255,255,.6);}
  .sub{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:24px 0 12px;}
  .sect-dark .sub{color:rgba(255,255,255,.5);}

  /* LED Breathe */
  @keyframes led-core-breathe{0%,100%{opacity:.64;}50%{opacity:1;}}
  @keyframes led-halo-expand{0%,100%{opacity:.1;transform:scale(.92);}50%{opacity:.34;transform:scale(1.08);}}
  .anim-breathe .led-core{animation:led-core-breathe 3.6s ease-in-out infinite;}
  .anim-breathe .led-aura{animation:led-halo-expand 3.6s ease-in-out infinite;transform-origin:center;transform-box:fill-box;}

  /* Banner preview */
  .banner-row{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:24px;}
  .banner-card{border-radius:20px;border:1px solid var(--line);background:rgba(255,255,255,.58);overflow:hidden;display:flex;flex-direction:column;}
  .sect-dark .banner-card{border-color:rgba(255,255,255,.06);background:rgba(255,255,255,.04);}
  .banner-preview{display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
  .banner-meta{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .banner-meta-left{display:flex;flex-direction:column;gap:2px;}
  .banner-name{font-size:13px;font-weight:700;}
  .banner-dims{font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace;}
  .sect-dark .banner-dims{color:rgba(255,255,255,.35);}
  .banner-usage{font-size:10px;color:var(--muted);}
  .anim-badge{position:absolute;top:10px;right:10px;background:var(--ember);color:#fff;font-size:8px;font-weight:700;letter-spacing:.1em;padding:3px 8px;border-radius:6px;text-transform:uppercase;z-index:2;}

  /* Copy button */
  .btn-copy{padding:6px 14px;border:1px solid var(--line);border-radius:10px;background:rgba(255,255,255,.5);color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;letter-spacing:.04em;flex-shrink:0;}
  .btn-copy:hover{background:var(--ink);color:var(--porcelain);border-color:var(--ink);}
  .btn-copy.copied{background:rgba(255,147,97,.12);color:var(--ember);border-color:rgba(255,147,97,.3);}
  .sect-dark .btn-copy{border-color:rgba(255,255,255,.1);background:rgba(255,255,255,.06);color:rgba(255,255,255,.5);}
  .sect-dark .btn-copy:hover{background:var(--ember);color:#fff;border-color:var(--ember);}
</style>
</head>
<body>

<script>
const LED=(s,bg,shellC,coreC)=>`<svg viewBox="0 0 96 96" width="${s}" height="${s}" fill="none"><rect width="96" height="96" rx="26" fill="${bg}"/><rect class="led-shell" x="31" y="14" width="34" height="68" rx="17" stroke="${shellC}" stroke-width="2.5"/><rect class="led-core" x="43" y="28" width="10" height="40" rx="5" fill="${coreC}"/></svg>`;
const LED_AURA=(s,bg,shellC,coreC,auraC)=>`<svg viewBox="0 0 96 96" width="${s}" height="${s}" fill="none"><rect width="96" height="96" rx="26" fill="${bg}"/><rect class="led-aura" x="33" y="18" width="30" height="60" rx="15" fill="${auraC}" opacity=".12"/><rect class="led-shell" x="31" y="14" width="34" height="68" rx="17" stroke="${shellC}" stroke-width="2.5"/><rect class="led-core" x="43" y="28" width="10" height="40" rx="5" fill="${coreC}"/></svg>`;
const C={sage:'#C5CFBF',ink:'#151D2A',porcelain:'#F6F3EC',lake:'#4A8395',ember:'#FF9361',muted:'#69717a'};

let h='<div class="page">';

// Header
h+=`<div style="display:flex;align-items:center;gap:16px;margin-bottom:8px;">`;
h+=LED(48,C.ink,'rgba(246,243,236,.22)',C.ember);
h+=`<div><div style="font-family:'Sora',sans-serif;font-weight:300;font-size:28px;letter-spacing:-.03em;">faraday</div><div style="font-size:11px;color:${C.muted};letter-spacing:.1em;text-transform:uppercase;font-weight:600;">Bannières Réseaux Sociaux</div></div></div>`;
h+=`<div style="height:1px;background:var(--line);margin:20px 0;"></div>`;

// ============================================================
// SECTION 1 — Instagram
h+=`<div class="sect"><div class="kicker">01 — Instagram</div><h2>Posts & Stories</h2>`;
h+=`<p class="sect-desc">Formats carrés (1080×1080) pour le feed et verticaux (1080×1920) pour les stories. Gradient Warm Walnut ou Deep Ink.</p>`;

h+=`<div class="sub">Feed — Warm Walnut</div>`;
h+=`<div class="banner-row">`;

// IG Post statique
h+=`<div class="banner-card"><div class="banner-preview" style="width:360px;height:360px;background:linear-gradient(135deg,rgba(138,122,104,.85),rgba(74,58,40,.9));flex-direction:column;gap:16px;">`;
h+=LED_AURA(100,'transparent','rgba(255,255,255,.2)',C.ember,C.ember);
h+=`<div style="font-family:'Sora',sans-serif;font-weight:300;font-size:28px;color:rgba(255,255,255,.9);letter-spacing:-.03em;">faraday</div>`;
h+=`<div style="font-family:'Sora',sans-serif;font-weight:300;font-size:12px;color:rgba(255,255,255,.45);letter-spacing:.05em;">Déposez. Déconnectez.</div>`;
h+=`</div><div class="banner-meta"><div class="banner-meta-left"><div class="banner-name">Post Feed</div><div class="banner-dims">1080 × 1080</div></div><button class="btn-copy" onclick="copyB(this,'ig-post')">Copier SVG</button></div></div>`;

// IG Post animé
h+=`<div class="banner-card"><div class="banner-preview anim-breathe" style="width:360px;height:360px;background:linear-gradient(135deg,rgba(138,122,104,.85),rgba(74,58,40,.9));flex-direction:column;gap:16px;">`;
h+=`<div class="anim-badge">ANIMÉ</div>`;
h+=LED_AURA(100,'transparent','rgba(255,255,255,.2)',C.ember,C.ember);
h+=`<div style="font-family:'Sora',sans-serif;font-weight:300;font-size:28px;color:rgba(255,255,255,.9);letter-spacing:-.03em;">faraday</div>`;
h+=`<div style="font-family:'Sora',sans-serif;font-weight:300;font-size:12px;color:rgba(255,255,255,.45);letter-spacing:.05em;">Déposez. Déconnectez.</div>`;
h+=`</div><div class="banner-meta"><div class="banner-meta-left"><div class="banner-name">Post Feed — Animé</div><div class="banner-dims">1080 × 1080</div></div><button class="btn-copy" onclick="copyB(this,'ig-post-anim')">Copier SVG</button></div></div>`;

h+=`</div>`;

// Stories
h+=`<div class="sub">Stories — Deep Ink</div>`;
h+=`<div class="banner-row">`;

// Story statique
h+=`<div class="banner-card"><div class="banner-preview" style="width:220px;height:390px;background:linear-gradient(160deg,rgba(21,29,42,.95),rgba(10,16,24,.98));flex-direction:column;gap:14px;">`;
h+=LED_AURA(80,'transparent','rgba(246,243,236,.15)',C.ember,C.ember);
h+=`<div style="font-family:'Sora',sans-serif;font-weight:300;font-size:18px;color:rgba(246,243,236,.85);letter-spacing:-.02em;">faraday</div>`;
h+=`</div><div class="banner-meta"><div class="banner-meta-left"><div class="banner-name">Story</div><div class="banner-dims">1080 × 1920</div></div><button class="btn-copy" onclick="copyB(this,'ig-story')">Copier SVG</button></div></div>`;

// Story animée
h+=`<div class="banner-card"><div class="banner-preview anim-breathe" style="width:220px;height:390px;background:linear-gradient(160deg,rgba(21,29,42,.95),rgba(10,16,24,.98));flex-direction:column;gap:14px;">`;
h+=`<div class="anim-badge">ANIMÉ</div>`;
h+=LED_AURA(80,'transparent','rgba(246,243,236,.15)',C.ember,C.ember);
h+=`<div style="font-family:'Sora',sans-serif;font-weight:300;font-size:18px;color:rgba(246,243,236,.85);letter-spacing:-.02em;">faraday</div>`;
h+=`</div><div class="banner-meta"><div class="banner-meta-left"><div class="banner-name">Story — Animée</div><div class="banner-dims">1080 × 1920</div></div><button class="btn-copy" onclick="copyB(this,'ig-story-anim')">Copier SVG</button></div></div>`;

h+=`</div></div>`;

// ============================================================
// SECTION 2 — LinkedIn + Twitter
h+=`<div class="sect sect-dark"><div class="kicker">02 — LinkedIn & X</div><h2>Couvertures de profil</h2>`;
h+=`<p class="sect-desc">Formats paysage pour les bannières de profil. Fond Ink ou Porcelain selon la plateforme.</p>`;

h+=`<div class="sub">LinkedIn — 1584 × 396</div>`;
h+=`<div class="banner-row">`;
h+=`<div class="banner-card" style="flex:1;"><div class="banner-preview" style="width:100%;height:132px;background:${C.ink};justify-content:space-between;padding:0 32px;">`;
h+=`<div style="display:flex;align-items:center;gap:14px;">${LED(52,'transparent','rgba(246,243,236,.2)',C.ember)}<span style="font-family:'Sora',sans-serif;font-weight:300;font-size:20px;color:${C.porcelain};letter-spacing:-.02em;">faraday</span></div>`;
h+=`<span style="font-family:'Sora',sans-serif;font-weight:300;font-size:11px;color:rgba(246,243,236,.4);text-align:right;">Déposez.<br>Déconnectez.</span>`;
h+=`</div><div class="banner-meta"><div class="banner-meta-left"><div class="banner-name">LinkedIn Banner</div><div class="banner-dims">1584 × 396</div><div class="banner-usage">Couverture profil / page entreprise</div></div><button class="btn-copy" onclick="copyB(this,'linkedin')">Copier SVG</button></div></div>`;
h+=`</div>`;

h+=`<div class="sub">Twitter / X — 1500 × 500</div>`;
h+=`<div class="banner-row">`;
h+=`<div class="banner-card" style="flex:1;"><div class="banner-preview" style="width:100%;height:167px;background:${C.porcelain};gap:14px;border-bottom:3px solid ${C.sage};">`;
h+=`<div style="display:flex;align-items:center;gap:14px;">${LED(56,'transparent','rgba(21,29,42,.12)',C.ember)}<span style="font-family:'Sora',sans-serif;font-weight:300;font-size:24px;color:${C.ink};letter-spacing:-.02em;">faraday</span></div>`;
h+=`</div><div class="banner-meta"><div class="banner-meta-left"><div class="banner-name">X / Twitter Header</div><div class="banner-dims">1500 × 500</div><div class="banner-usage">Couverture profil</div></div><button class="btn-copy" onclick="copyB(this,'twitter')">Copier SVG</button></div></div>`;
h+=`</div></div>`;

// ============================================================
// SECTION 3 — OG Images
h+=`<div class="sect"><div class="kicker">03 — Open Graph</div><h2>Aperçus de liens</h2>`;
h+=`<p class="sect-desc">Images de prévisualisation pour les partages de liens (Slack, iMessage, WhatsApp, etc.).</p>`;

h+=`<div class="sub">Warm Walnut</div>`;
h+=`<div class="banner-row">`;
h+=`<div class="banner-card" style="flex:1;"><div class="banner-preview" style="width:100%;height:210px;background:linear-gradient(135deg,rgba(138,122,104,.85),rgba(74,58,40,.9));flex-direction:column;gap:10px;">`;
h+=LED(56,'transparent','rgba(255,255,255,.2)',C.ember);
h+=`<div style="font-family:'Sora',sans-serif;font-weight:300;font-size:24px;color:rgba(255,255,255,.9);letter-spacing:-.02em;">faraday</div>`;
h+=`<div style="font-family:'Sora',sans-serif;font-weight:300;font-size:12px;color:rgba(255,255,255,.5);text-align:center;max-width:75%;">La cage de Faraday pour votre téléphone</div>`;
h+=`</div><div class="banner-meta"><div class="banner-meta-left"><div class="banner-name">OG Image — Clair</div><div class="banner-dims">1200 × 630</div></div><button class="btn-copy" onclick="copyB(this,'og')">Copier SVG</button></div></div>`;
h+=`</div>`;

h+=`<div class="sub">Deep Ink</div>`;
h+=`<div class="banner-row">`;
h+=`<div class="banner-card" style="flex:1;"><div class="banner-preview" style="width:100%;height:210px;background:${C.ink};flex-direction:column;gap:10px;">`;
h+=LED(56,'transparent','rgba(246,243,236,.15)',C.ember);
h+=`<div style="font-family:'Sora',sans-serif;font-weight:300;font-size:24px;color:rgba(246,243,236,.9);letter-spacing:-.02em;">faraday</div>`;
h+=`<div style="font-family:'Sora',sans-serif;font-weight:300;font-size:12px;color:rgba(246,243,236,.45);text-align:center;max-width:75%;">La cage de Faraday pour votre téléphone</div>`;
h+=`</div><div class="banner-meta"><div class="banner-meta-left"><div class="banner-name">OG Image — Sombre</div><div class="banner-dims">1200 × 630</div></div><button class="btn-copy" onclick="copyB(this,'og-dark')">Copier SVG</button></div></div>`;
h+=`</div></div>`;

// ============================================================
// SECTION 4 — Specs
h+=`<div class="sect"><div class="kicker">04 — Spécifications</div><h2>Récapitulatif</h2>`;
h+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;">`;
[
  {t:'Instagram Post',d:'1080 × 1080 px',u:'Feed carré'},
  {t:'Instagram Story',d:'1080 × 1920 px',u:'Stories / Reels cover'},
  {t:'LinkedIn Banner',d:'1584 × 396 px',u:'Couverture profil'},
  {t:'Twitter / X',d:'1500 × 500 px',u:'Header profil'},
  {t:'OG Image',d:'1200 × 630 px',u:'Aperçu de lien'},
  {t:'Gradients',d:'Warm Walnut / Deep Ink',u:'Jamais Sage + Ember ⛔'},
].forEach(s=>{
  h+=`<div style="padding:16px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.5);">`;
  h+=`<div style="font-size:13px;font-weight:700;">${s.t}</div>`;
  h+=`<div style="font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--muted);margin-top:4px;">${s.d}</div>`;
  h+=`<div style="font-size:11px;color:var(--muted);margin-top:2px;">${s.u}</div></div>`;
});
h+=`</div></div>`;

h+=`</div>`; // .page

document.write(h);
</script>

<script>
// Copy SVG to clipboard
async function copyB(btn,id){
  // Get the banner preview element
  const card = btn.closest('.banner-card');
  const preview = card.querySelector('.banner-preview');
  const svg = preview.innerHTML;
  try {
    await navigator.clipboard.writeText(svg);
    btn.classList.add('copied');
    btn.textContent='Copié !';
    setTimeout(()=>{btn.classList.remove('copied');btn.textContent='Copier SVG';},1800);
  } catch(e){ console.error(e); }
}
</script>
<script src="research/nav.js"></script>
</body>
</html>
