<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faraday — Brand Book</title>
<!-- No DaisyUI/Tailwind CDN — conflicts with custom layout -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Sora:wght@300;400;600;700&family=Manrope:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --sage:#C5CFBF;--ink:#151D2A;--porcelain:#F6F3EC;--lake:#4A8395;--ember:#FF9361;
    --muted:#69717a;--line:rgba(17,22,29,.1);--paper:rgba(255,255,255,.72);
  }
  body{margin:0;color:var(--ink);font-family:'Manrope',sans-serif;background:var(--porcelain);}

  /* Layout */
  .page{width:min(1280px,calc(100% - 48px));margin:0 auto;padding:40px 0 80px;}
  .sect{margin-top:32px;padding:32px;border-radius:28px;border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(255,255,255,.54));}
  .sect-dark{background:linear-gradient(180deg,rgba(21,29,42,.97),rgba(21,29,42,.94));color:var(--porcelain);border-color:rgba(255,255,255,.06);}
  .kicker{display:inline-flex;padding:8px 12px;border-radius:999px;background:rgba(17,22,29,.06);font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#34404d;}
  .sect-dark .kicker{background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);}
  h2{margin:14px 0 10px;font-family:'Sora',sans-serif;font-size:clamp(28px,4vw,48px);line-height:.98;letter-spacing:-.04em;font-weight:700;}
  .sect-desc{font-size:16px;line-height:1.7;color:var(--muted);max-width:600px;margin-bottom:28px;}
  .sect-dark .sect-desc{color:rgba(255,255,255,.6);}
  .sub{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:24px 0 12px;}
  .sect-dark .sub{color:rgba(255,255,255,.5);}
  .grid{display:flex;flex-wrap:wrap;gap:16px;}
  .grid-scroll{display:flex;gap:28px;overflow-x:auto;padding-bottom:16px;flex-wrap:nowrap;}

  /* LED Mark SVG */
  .mark{width:74px;height:74px;flex:0 0 74px;}
  .mark.sm{width:48px;height:48px;flex-basis:48px;}
  .mark.xs{width:32px;height:32px;flex-basis:32px;}
  .mark.lg{width:96px;height:96px;flex-basis:96px;}

  /* Lockup */
  .logo-stage{display:flex;align-items:center;justify-content:center;min-height:160px;padding:28px;border-radius:22px;}
  .logo-lockup{display:flex;align-items:center;gap:16px;}
  .stacked-lockup{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;}
  .wm-title{font-family:'Sora',sans-serif;font-weight:300;font-size:36px;letter-spacing:-.03em;line-height:1;}
  .wm-bl{font-size:11px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;opacity:.55;margin-top:6px;}

  /* Swatch */
  .swatch{display:grid;grid-template-columns:56px 1fr auto;gap:12px;align-items:center;padding:10px;border-radius:14px;background:rgba(255,255,255,.56);border:1px solid var(--line);}
  .chip{width:56px;height:44px;border-radius:12px;}
  .swatch-n{font-size:13px;font-weight:700;}
  .swatch-h{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);}
  .swatch-r{font-size:11px;color:var(--muted);}

  /* Anim */
  @keyframes led-core-breathe{0%,100%{opacity:.64;}50%{opacity:1;}}
  @keyframes led-halo-expand{0%,100%{opacity:.1;transform:scale(.92);}50%{opacity:.34;transform:scale(1.08);}}
  @keyframes led-rise-in{0%{opacity:0;transform:translateY(10px) scaleY(.72);}40%{opacity:.92;transform:translateY(0) scaleY(1.02);}100%{opacity:1;transform:translateY(0) scaleY(1);}}
  @keyframes led-shell-settle{0%{opacity:0;}100%{opacity:1;}}
  @keyframes led-double-blink{0%,18%,32%,100%{opacity:.28;}8%,24%{opacity:1;}}

  .anim-breathe .led-core{animation:led-core-breathe 3.6s ease-in-out infinite;}
  .anim-breathe .led-aura{animation:led-halo-expand 3.6s ease-in-out infinite;transform-origin:center;transform-box:fill-box;}
  .anim-rise .led-core{animation:led-rise-in 2.9s ease-in-out infinite;transform-origin:center;transform-box:fill-box;}
  .anim-rise .led-shell{animation:led-shell-settle 2.9s ease-in-out infinite;}
  .anim-rise .led-aura{animation:led-halo-expand 2.9s ease-in-out infinite;transform-origin:center;transform-box:fill-box;}
  .anim-blink .led-core{animation:led-double-blink 4.2s ease-in-out infinite;}

  /* 5. Beacon Morse — LED talks in short/long pulses */
  @keyframes led-morse{0%,8%{opacity:1;}12%,20%{opacity:.15;}24%,36%{opacity:1;}40%,52%{opacity:.15;}56%,60%{opacity:1;}64%,100%{opacity:.15;}}
  .anim-morse .led-core{animation:led-morse 4s ease-in-out infinite;}

  /* 6. Dim Out — LED slowly dims to almost nothing then comes back */
  @keyframes led-dim{0%{opacity:1;}40%{opacity:.08;}60%{opacity:.08;}100%{opacity:1;}}
  .anim-dim .led-core{animation:led-dim 5s ease-in-out infinite;}
  .anim-dim .led-shell{animation:led-dim 5s ease-in-out infinite;animation-delay:.3s;}

  /* 7. Heartbeat LED — double pulse like a heart */
  @keyframes led-heart{0%,100%{opacity:.3;transform:scale(1);}14%{opacity:1;transform:scale(1.08);}22%{opacity:.5;transform:scale(1);}32%{opacity:1;transform:scale(1.05);}44%{opacity:.3;transform:scale(1);}}
  .anim-heart .led-core{animation:led-heart 2.4s ease-in-out infinite;transform-origin:center;transform-box:fill-box;}

  /* 8. Pendulum — LED sways side to side gently */
  @keyframes led-pendulum{0%,100%{transform:rotate(0deg);}25%{transform:rotate(4deg);}75%{transform:rotate(-4deg);}}
  .anim-pendulum .led-core{animation:led-pendulum 4s ease-in-out infinite;transform-origin:center bottom;transform-box:fill-box;}
  .anim-pendulum .led-shell{animation:led-pendulum 4s ease-in-out infinite;transform-origin:center bottom;transform-box:fill-box;}

  /* 9. Flicker — unstable signal becoming stable */
  @keyframes led-flicker{0%{opacity:.1;}5%{opacity:.8;}10%{opacity:.2;}14%{opacity:.9;}18%{opacity:.15;}24%{opacity:.7;}30%{opacity:.3;}38%{opacity:1;}50%,100%{opacity:1;}}
  .anim-flicker .led-core{animation:led-flicker 4s ease-in-out infinite;}

  /* 10. Slow Fade In — cinematic reveal */
  @keyframes led-slow-fade{0%{opacity:0;filter:blur(4px);}60%{opacity:.6;filter:blur(1px);}100%{opacity:1;filter:blur(0);}}
  .anim-slow .led-core{animation:led-slow-fade 5s ease-out infinite;}
  .anim-slow .led-shell{animation:led-slow-fade 5s ease-out infinite;animation-delay:.5s;opacity:0;}

  /* 11. Glow Pulse — LED core pulses with a warm expanding glow */
  @keyframes led-glow-core{0%,100%{opacity:.7;filter:brightness(1);}50%{opacity:1;filter:brightness(1.3);}}
  @keyframes led-glow-aura{0%,100%{opacity:0;transform:scale(.8);}50%{opacity:.25;transform:scale(1.2);}}
  .anim-glow-pulse .led-core{animation:led-glow-core 3s ease-in-out infinite;}
  .anim-glow-pulse .led-aura{animation:led-glow-aura 3s ease-in-out infinite;transform-origin:center;transform-box:fill-box;}

  /* 12. SOS — urgent triple-triple-triple */
  @keyframes led-sos{0%,4%{opacity:1;}6%,10%{opacity:.1;}12%,16%{opacity:1;}18%,22%{opacity:.1;}24%,28%{opacity:1;}30%,40%{opacity:.1;}42%,50%{opacity:1;}52%,56%{opacity:.1;}58%,66%{opacity:1;}68%,72%{opacity:.1;}74%,82%{opacity:1;}84%,100%{opacity:.1;}}
  .anim-sos .led-core{animation:led-sos 6s ease-in-out infinite;}

  /* iPhone 17 — 393x852 with realistic frame */
  .phone{width:393px;height:852px;border-radius:52px;border:6px solid #1a1a1a;overflow:hidden;display:flex;flex-direction:column;background:var(--porcelain);color:var(--ink);box-shadow:0 0 0 2px #333,0 30px 80px rgba(17,22,29,.2);flex-shrink:0;position:relative;}
  .phone::before{content:'';position:absolute;top:10px;left:50%;transform:translateX(-50%);width:126px;height:30px;background:#1a1a1a;border-radius:16px;z-index:10;}
  .phone::after{content:'';position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:rgba(17,22,29,.2);border-radius:3px;z-index:10;}
  .phone.dark{background:#111820;color:var(--porcelain);}
  .phone.dark::before{background:#000;}
  .phone.dark::after{background:rgba(255,255,255,.15);}
  .ph-status{display:flex;justify-content:space-between;padding:20px 30px 8px;font-size:13px;font-weight:600;color:var(--muted);position:relative;z-index:5;}
  .phone.dark .ph-status{color:#555;}
  .ph-header{padding:14px 24px;display:flex;align-items:center;gap:12px;}
  .ph-header .wm{font-family:'Sora',sans-serif;font-weight:300;font-size:18px;letter-spacing:-.02em;}
  .ph-body{flex:1;overflow-y:auto;padding:0 24px 16px;}
  .ph-nav{display:flex;justify-content:space-around;padding:12px 12px 38px;border-top:1px solid var(--line);font-size:10px;color:var(--muted);background:inherit;}
  .phone.dark .ph-nav{border-color:rgba(255,255,255,.06);color:#555;}
  .ph-nav .pni{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:48px;}
  .ph-nav .pni.active{color:var(--ink);font-weight:600;}
  .phone.dark .ph-nav .pni.active{color:var(--sage);}

  /* App components */
  .app-card{border-radius:16px;padding:16px;margin-bottom:12px;}
  .app-card-outline{border:1px solid var(--line);background:rgba(255,255,255,.5);}
  .phone.dark .app-card-outline{border-color:rgba(255,255,255,.06);background:rgba(255,255,255,.03);}
  .app-stat{font-family:'IBM Plex Mono',monospace;font-weight:600;}
  .app-label{font-size:10px;color:var(--muted);margin-top:2px;}
  .phone.dark .app-label{color:#556;}
  .app-section-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:18px 0 10px;}
  .phone.dark .app-section-title{color:rgba(255,255,255,.35);}
  .app-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);}
  .phone.dark .app-row{border-color:rgba(255,255,255,.06);}
  .app-row:last-child{border-bottom:none;}
  .app-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;}
  .app-badge{font-size:9px;padding:2px 7px;border-radius:6px;font-weight:600;}
  .app-tag{font-size:9px;padding:2px 7px;border-radius:5px;background:rgba(17,22,29,.05);color:var(--muted);margin-left:4px;}
  .phone.dark .app-tag{background:rgba(255,255,255,.06);}

  /* Metro ad */
  .metro{width:100%;height:320px;border-radius:20px;overflow:hidden;display:flex;align-items:center;padding:48px 56px;gap:48px;box-shadow:0 20px 60px rgba(17,22,29,.1);margin-bottom:16px;}

  /* Business card */
  .bcard{width:400px;height:240px;border-radius:14px;display:flex;flex-direction:column;justify-content:space-between;padding:28px;box-shadow:0 8px 30px rgba(17,22,29,.06);}

  /* Instagram */
  .insta{width:360px;border-radius:14px;overflow:hidden;box-shadow:0 8px 30px rgba(17,22,29,.06);border:1px solid rgba(17,22,29,.1);}

  /* Mini card */
  .mini-card{padding:14px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.58);text-align:center;}
  .mini-card span{display:block;margin-top:10px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
</style>
</head>
<body>

<script>
// LED mark SVGs — from Codex
const LED=(s,bg,shellC,coreC)=>`<svg viewBox="0 0 96 96" width="${s}" height="${s}" fill="none"><rect width="96" height="96" rx="26" fill="${bg}"/><rect class="led-shell" x="31" y="14" width="34" height="68" rx="17" stroke="${shellC}" stroke-width="2.5"/><rect class="led-core" x="43" y="28" width="10" height="40" rx="5" fill="${coreC}"/></svg>`;
const LED_AURA=(s,bg,shellC,coreC,auraC)=>`<svg viewBox="0 0 96 96" width="${s}" height="${s}" fill="none"><rect width="96" height="96" rx="26" fill="${bg}"/><rect class="led-aura" x="33" y="18" width="30" height="60" rx="15" fill="${auraC}" opacity=".12"/><rect class="led-shell" x="31" y="14" width="34" height="68" rx="17" stroke="${shellC}" stroke-width="2.5"/><rect class="led-core" x="43" y="28" width="10" height="40" rx="5" fill="${coreC}"/></svg>`;
const LED_CORE=(s,coreC)=>`<svg viewBox="0 0 96 96" width="${s}" height="${s}" fill="none"><rect x="43" y="26" width="10" height="44" rx="5" fill="${coreC}"/></svg>`;
const LED_MONO=(s,c)=>`<svg viewBox="0 0 96 96" width="${s}" height="${s}" fill="none"><rect x="31" y="14" width="34" height="68" rx="17" stroke="${c}" stroke-width="4"/><rect x="43" y="28" width="10" height="40" rx="5" fill="${c}"/></svg>`;

const C={sage:'#C5CFBF',ink:'#151D2A',porcelain:'#F6F3EC',lake:'#4A8395',ember:'#FF9361',muted:'#69717a'};

// Nav helper for phones
const appNav=(active)=>{
  const items=[{i:'&#9679;',n:'Home',k:'h'},{i:'&#9829;',n:'Groupes',k:'g'},{i:'&#9632;',n:'Boxes',k:'b'},{i:'&#9650;',n:'Stats',k:'s'},{i:'&#9783;',n:'Plus',k:'p'}];
  return `<div class="ph-nav">${items.map(it=>`<div class="pni${active===it.k?' active':''}">${it.i}<br>${it.n}</div>`).join('')}</div>`;
};

let h='';

// ============================================================
// HERO
// ============================================================
h+=`<div class="page">`;
h+=`<div class="sect" style="padding:48px;background:linear-gradient(140deg,rgba(255,255,255,.76),rgba(255,255,255,.52)),linear-gradient(120deg,rgba(197,207,191,.2),rgba(14,24,38,.04));position:relative;overflow:hidden;">`;
h+=`<div style="display:grid;grid-template-columns:1.4fr .8fr;gap:32px;align-items:center;">`;
h+=`<div>`;
h+=`<div class="kicker">Piste 1 — Brand Book 2026</div>`;
h+=`<h2 style="font-size:clamp(48px,6vw,78px);">faraday</h2>`;
h+=`<p class="sect-desc" style="margin-top:16px;">Un objet connecte qui protege votre attention. Déposez votre téléphone, reprenez votre temps. Chaque detail de cette identite sert un objectif : rendre le calme desirable.</p>`;
h+=`<div style="font-size:12px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;opacity:.5;">Disconnect to reconnect</div>`;
h+=`</div>`;
h+=`<div style="display:flex;justify-content:center;align-items:center;">`;
h+=`<div class="anim-breathe" style="width:160px;height:160px;">${LED_AURA(160,C.ink,'rgba(246,243,236,.22)',C.ember,C.ember)}</div>`;
h+=`</div></div></div>`;

// ============================================================
// 01 — LOGO SYSTEM
// ============================================================
h+=`<div class="sect"><div class="kicker">01 — Logo</div><h2>Systeme de marque</h2>`;
h+=`<p class="sect-desc">Le mark LED represente la présence lumineuse de la box — un temoin discret qui dit "je suis la, déposez votre téléphone".</p>`;

// Primary: Ink + Ember, Ink + Lake
h+=`<div class="sub">Logo principal — fond Ink Charcoal</div><div class="grid" style="gap:14px;">`;
h+=`<div class="logo-stage" style="background:${C.ink};flex:1;min-width:320px;"><div class="logo-lockup" style="color:${C.porcelain};">${LED(74,C.ink,'rgba(246,243,236,.22)',C.ember)}<div><div class="wm-title">faraday</div><div class="wm-bl">Disconnect to reconnect</div></div></div></div>`;
h+=`<div class="logo-stage" style="background:${C.ink};flex:1;min-width:320px;"><div class="logo-lockup" style="color:${C.porcelain};">${LED(74,C.ink,'rgba(246,243,236,.22)',C.lake)}<div><div class="wm-title">faraday</div><div class="wm-bl">Disconnect to reconnect</div></div></div></div>`;
h+=`</div>`;
// Decli 2: Porcelain + Ember
h+=`<div class="sub">Declinaison 2 — fond Porcelain</div><div class="grid" style="gap:14px;">`;
h+=`<div class="logo-stage" style="background:${C.porcelain};border:1px solid var(--line);flex:1;min-width:320px;"><div class="logo-lockup" style="color:${C.ink};">${LED(74,C.porcelain,'rgba(21,29,42,.15)',C.ember)}<div><div class="wm-title">faraday</div><div class="wm-bl">Disconnect to reconnect</div></div></div></div>`;
h+=`</div>`;
// Decli 3: Sage + Porcelain LED
h+=`<div class="sub">Declinaison 3 — fond Sage Mist</div><div class="grid" style="gap:14px;">`;
h+=`<div class="logo-stage" style="background:${C.sage};flex:1;min-width:320px;"><div class="logo-lockup" style="color:${C.ink};">${LED(74,C.sage,'rgba(21,29,42,.15)',C.porcelain)}<div><div class="wm-title">faraday</div><div class="wm-bl">Disconnect to reconnect</div></div></div></div>`;
h+=`</div>`;

// Stacked
h+=`<div class="sub">Empile</div><div class="grid" style="gap:14px;">`;
h+=`<div class="logo-stage" style="background:${C.ink};padding:32px 40px;"><div class="stacked-lockup" style="color:${C.porcelain};">${LED(56,C.ink,'rgba(246,243,236,.22)',C.ember)}<div class="wm-title" style="font-size:28px;">faraday</div><div class="wm-bl">Disconnect to reconnect</div></div></div>`;
h+=`<div class="logo-stage" style="background:${C.porcelain};border:1px solid var(--line);padding:32px 40px;"><div class="stacked-lockup" style="color:${C.ink};">${LED(56,C.porcelain,'rgba(21,29,42,.15)',C.ember)}<div class="wm-title" style="font-size:28px;">faraday</div><div class="wm-bl">Disconnect to reconnect</div></div></div>`;
h+=`<div class="logo-stage" style="background:${C.sage};padding:32px 40px;"><div class="stacked-lockup" style="color:${C.ink};">${LED(56,C.sage,'rgba(21,29,42,.15)',C.porcelain)}<div class="wm-title" style="font-size:28px;">faraday</div><div class="wm-bl">Disconnect to reconnect</div></div></div>`;
h+=`</div>`;

// Mark variations mini
h+=`<div class="sub">Declinaisons du mark</div><div class="grid" style="gap:10px;">`;
[
  {svg:LED(48,C.ink,'rgba(246,243,236,.22)',C.ember),n:'Primary Ember'},
  {svg:LED(48,C.ink,'rgba(246,243,236,.22)',C.lake),n:'Primary Lake'},
  {svg:LED(48,C.porcelain,'rgba(21,29,42,.15)',C.ember),n:'Decli Porcelain'},
  {svg:LED(48,C.sage,'rgba(21,29,42,.15)',C.porcelain),n:'Decli Sage'},
  {svg:LED_MONO(48,C.ink),n:'Gravure mono'},
  {svg:LED_CORE(48,C.ember),n:'Beacon Ember'},
  {svg:LED_CORE(48,C.lake),n:'Lake Accent'},
].forEach(v=>{h+=`<div class="mini-card"><div style="display:grid;place-items:center;height:52px;">${v.svg}</div><span>${v.n}</span></div>`;});
h+=`</div></div>`;

// ============================================================
// 02 — ANIMATIONS
// ============================================================
h+=`<div class="sect"><div class="kicker">02 — Motion</div><h2>Animations du mark</h2>`;
h+=`<p class="sect-desc">12 animations LED. Chacune liee a un moment precis de l'experience.</p>`;
h+=`<div class="grid" style="gap:14px;">`;
[
  {cls:'anim-breathe',n:'Gentle Wake',d:'Splash screen, lancement',bg:C.ink,dark:true},
  {cls:'anim-breathe',n:'Quiet Halo',d:'Idle, focus, attente',bg:C.porcelain},
  {cls:'anim-blink',n:'Soft Confirm',d:'Confirmation de session',bg:C.ink,dark:true},
  {cls:'anim-rise',n:'Lock In',d:'Detection box, entree session',bg:C.ink,dark:true},
  {cls:'anim-morse',n:'Beacon Morse',d:'La LED parle en code',bg:C.ink,dark:true},
  {cls:'anim-dim',n:'Dim Out',d:'Mise en veille, goodbye',bg:C.ink,dark:true},
  {cls:'anim-heart',n:'Heartbeat',d:'Session active, présence',bg:C.ink,dark:true},
  {cls:'anim-pendulum',n:'Pendulum',d:'Attente, meditation, bercement',bg:C.ink,dark:true},
  {cls:'anim-flicker',n:'Flicker',d:'Signal instable → stable',bg:C.ink,dark:true},
  {cls:'anim-slow',n:'Slow Reveal',d:'Cinema, keynote, hero',bg:C.ink,dark:true},
  {cls:'anim-glow-pulse',n:'Glow Pulse',d:'Notification, chaleur',bg:C.ink,dark:true},
  {cls:'anim-sos',n:'SOS',d:'Alerte, rappel urgent',bg:C.ink,dark:true},
].forEach(a=>{
  const shell=a.dark?'rgba(246,243,236,.22)':'rgba(21,29,42,.15)';
  const core=a.dark?C.ember:C.ember;
  const aura=a.dark?C.ember:C.ember;
  h+=`<div style="flex:1;min-width:200px;"><div class="${a.cls}" style="display:grid;place-items:center;min-height:140px;border-radius:22px;background:${a.bg};">${LED_AURA(80,a.bg,shell,core,aura)}</div><div style="margin-top:10px;"><strong style="font-size:13px;font-weight:700;">${a.n}</strong><div style="font-size:12px;color:var(--muted);margin-top:2px;">${a.d}</div></div></div>`;
});
h+=`</div></div>`;

// ============================================================
// 03 — COULEURS
// ============================================================
h+=`<div class="sect"><div class="kicker">03 — Couleurs</div><h2>Palette</h2>`;
h+=`<p class="sect-desc">5 couleurs avec des roles semantiques precis. Jamais de secondaire dans le logo.</p>`;
h+=`<div style="display:grid;gap:8px;max-width:600px;">`;
[
