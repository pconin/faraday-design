<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faraday — Brand Book</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=Sora:wght@300;400;500;600&family=Manrope:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{--s:#CBD4C2;--c:#50514F;--w:#FFFCFF;--co:#DC766A;--bl:#247BA0;--g:#757780;--gc:#DBD4D3;--cd:#3a3b39;--sd:#a8b09e;}
  body{background:var(--w);font-family:'Inter',sans-serif;color:var(--c);}

  .hero{background:var(--s);text-align:center;padding:120px 40px 100px;}
  .sect{max-width:1100px;margin:0 auto;padding:70px 40px;}
  .div{height:1px;background:var(--gc);max-width:1100px;margin:0 auto;}
  .sh{font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--g);margin-bottom:6px;}
  .st{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:600;margin-bottom:12px;letter-spacing:-.01em;}
  .sd{font-size:13px;color:var(--g);line-height:1.7;max-width:580px;margin-bottom:32px;}
  .sub{font-size:10px;color:var(--g);margin:20px 0 10px;font-weight:500;}
  .g{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-bottom:20px;}
  .gl{justify-content:flex-start;}

  /* Logo */
  .lc{border-radius:14px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .ll{font-size:9px;color:var(--g);text-align:center;margin-top:6px;line-height:1.3;}

  /* Lockup */
  .lk{display:flex;align-items:center;gap:12px;padding:24px 30px;border-radius:12px;}
  .lk-i{width:40px;height:40px;border-radius:10px;overflow:hidden;flex-shrink:0;} .lk-i svg{width:100%;height:100%;}
  .lk-i.r{border-radius:50%;}
  .lk-bl{font-size:7.5px;letter-spacing:.2em;text-transform:uppercase;opacity:.35;margin-top:2px;font-weight:300;}
  .lk-s{display:flex;flex-direction:column;align-items:center;gap:4px;padding:32px;border-radius:12px;}
  .lk-si{width:50px;height:50px;border-radius:12px;overflow:hidden;} .lk-si svg{width:100%;height:100%;}

  /* Swatch */
  .sw{width:120px;border-radius:10px;overflow:hidden;}
  .sw-c{height:80px;display:flex;align-items:flex-end;padding:8px 10px;}
  .sw-inf{padding:8px 10px;background:#fff;}
  .sw-n{font-size:10px;font-weight:600;} .sw-h{font-size:9px;color:var(--g);font-family:'Space Mono',monospace;}
  .sw-r{font-size:8px;color:var(--g);margin-top:2px;}

  /* Anim */
  @keyframes draw{0%{stroke-dashoffset:200;}100%{stroke-dashoffset:0;}}
  @keyframes toFlat{0%,10%{d:path("M16.5,55 Q27.5,20 38.5,55 Q44,80 50.6,55 Q55,35 59.4,55 L93.5,55");}90%,100%{d:path("M16.5,55 Q27.5,55 38.5,55 Q44,55 50.6,55 Q55,55 59.4,55 L93.5,55");}}
  @keyframes fromFlat{0%,30%{d:path("M16.5,55 Q27.5,55 38.5,55 Q44,55 50.6,55 Q55,55 59.4,55 L93.5,55");}100%{d:path("M16.5,55 Q27.5,33 38.5,55 Q44,66 50.6,55 Q55,46 59.4,55 L93.5,55");}}
  @keyframes breathe{0%,100%{d:path("M16.5,55 Q27.5,40 38.5,55 Q44,63 50.6,55 Q55,48 59.4,55 L93.5,55");stroke-opacity:.6;}50%{d:path("M16.5,55 Q27.5,28 38.5,55 Q44,72 50.6,55 Q55,42 59.4,55 L93.5,55");stroke-opacity:1;}}
  @keyframes glow{0%{stroke-dashoffset:200;filter:none;}60%{stroke-dashoffset:0;filter:none;}80%{filter:drop-shadow(0 0 6px rgba(80,81,79,.3));}100%{filter:drop-shadow(0 0 2px rgba(80,81,79,.1));}}
  @keyframes glitch{0%,90%,100%{transform:translate(0);}92%{transform:translate(-1px,.5px);}94%{transform:translate(1px,-.5px);}96%{transform:translate(-.5px,0);}98%{transform:translate(.5px,.5px);}}
  @keyframes s1{0%,15%{opacity:0;}25%,100%{opacity:1;}}@keyframes s2{0%,30%{opacity:0;}45%,100%{opacity:1;}}@keyframes s3{0%,50%{opacity:0;}65%,100%{opacity:1;}}@keyframes s4{0%,65%{opacity:0;}80%,100%{opacity:1;}}
  @keyframes scaleIn{0%{transform:scale(.3);opacity:0;}60%{transform:scale(1.05);opacity:1;}100%{transform:scale(1);}}
  @keyframes hb{0%{d:path("M16.5,55 Q27.5,33 38.5,55 Q44,66 50.6,55 Q55,46 59.4,55 L93.5,55");}33%{d:path("M16.5,55 Q27.5,55 38.5,55 Q44,33 50.6,55 Q55,66 59.4,55 L93.5,55");}66%{d:path("M16.5,55 Q27.5,55 38.5,55 Q44,55 50.6,55 Q55,33 59.4,55 L93.5,55");}100%{d:path("M16.5,55 Q27.5,33 38.5,55 Q44,66 50.6,55 Q55,46 59.4,55 L93.5,55");}}
  @keyframes morph{0%,100%{rx:22px;}50%{rx:55px;}}

  .a1 path{stroke-dasharray:200;stroke-dashoffset:200;animation:draw 2.5s cubic-bezier(.4,0,.2,1) forwards;}
  .a2 path{animation:toFlat 4s cubic-bezier(.4,0,.2,1) forwards;}
  .a3 path{animation:fromFlat 3.5s cubic-bezier(.2,0,.4,1) forwards;}
  .a4 path{animation:breathe 5s ease-in-out infinite;}
  .a5 path{stroke-dasharray:200;stroke-dashoffset:200;animation:glow 3s cubic-bezier(.4,0,.2,1) forwards;}
  .a6 path{animation:glitch 4s ease-in-out infinite;}
  .a7 .s1{opacity:0;animation:s1 3s ease forwards;}.a7 .s2{opacity:0;animation:s2 3s ease forwards;}.a7 .s3{opacity:0;animation:s3 3s ease forwards;}.a7 .s4{opacity:0;animation:s4 3s ease forwards;}
  .a8 svg{animation:scaleIn 1s cubic-bezier(.2,0,.2,1.4) forwards;}
  .a9 path{animation:hb 3s linear infinite;}
  .a10 rect{animation:morph 4s ease-in-out infinite;}

  /* Phone */
  .ph{width:320px;border-radius:34px;border:2px solid var(--gc);overflow:hidden;display:flex;flex-direction:column;background:var(--w);box-shadow:0 12px 40px rgba(0,0,0,.05);}
  .ph-dark{background:var(--c);color:var(--w);border-color:#3a3b39;}
  .ph-dark .ph-sb{color:#666;}
  .ph-sb{display:flex;justify-content:space-between;padding:10px 22px 4px;font-size:10px;font-weight:600;color:var(--g);}
  .ph-nav{display:flex;justify-content:space-around;padding:6px 0 20px;border-top:1px solid var(--gc);font-size:8px;color:var(--g);}
  .ph-dark .ph-nav{border-color:#3a3b39;}
  .ph-ct{flex:1;overflow:hidden;padding:0 18px 8px;}

  /* Cards */
  .bc{width:380px;height:228px;border-radius:10px;display:flex;flex-direction:column;justify-content:space-between;padding:26px;box-shadow:0 4px 18px rgba(0,0,0,.05);}

  /* Instagram */
  .insta{width:340px;border-radius:10px;overflow:hidden;background:#fff;box-shadow:0 4px 18px rgba(0,0,0,.05);}

  /* Packaging */
  .pkg{width:200px;height:240px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;box-shadow:0 6px 20px rgba(0,0,0,.06);}

  /* Web header */
  .web{width:100%;max-width:800px;height:260px;border-radius:12px;overflow:hidden;display:flex;align-items:center;padding:40px 50px;gap:40px;box-shadow:0 6px 20px rgba(0,0,0,.05);margin-bottom:16px;}

  /* Notif */
  .nf{background:#fff;border-radius:12px;padding:12px;display:flex;align-items:center;gap:10px;box-shadow:0 3px 12px rgba(0,0,0,.04);max-width:360px;}
  .nf-i{width:34px;height:34px;border-radius:8px;overflow:hidden;flex-shrink:0;} .nf-i svg{width:100%;height:100%;}

  /* Email sig */
  .esig{background:#fff;border-radius:10px;padding:20px 24px;max-width:420px;box-shadow:0 3px 12px rgba(0,0,0,.04);display:flex;gap:16px;align-items:center;}
  .esig-sep{width:2px;height:60px;border-radius:1px;flex-shrink:0;}

  /* Icon system */
  .icon-grid{display:flex;gap:24px;flex-wrap:wrap;}
  .icon-ex{display:flex;flex-direction:column;align-items:center;gap:4px;}
  .icon-ex svg{width:32px;height:32px;}
  .icon-ex span{font-size:8px;color:var(--g);}
</style>
</head>
<body>
<script>
const P={s:'#CBD4C2',c:'#50514F',w:'#FFFCFF',co:'#DC766A',bl:'#247BA0',g:'#757780',gc:'#DBD4D3',cd:'#3a3b39'};
const F=(s,bg,fg)=>`<svg viewBox="0 0 ${s} ${s}"><rect width="${s}" height="${s}" rx="${s*.2}" fill="${bg}"/><path d="M${s*.15},${s*.5} Q${s*.25},${s*.3} ${s*.35},${s*.5} Q${s*.4},${s*.6} ${s*.46},${s*.5} Q${s*.5},${s*.42} ${s*.54},${s*.5} L${s*.85},${s*.5}" fill="none" stroke="${fg}" stroke-width="${s*.025}" stroke-linecap="round"/></svg>`;
const FR=(s,bg,fg)=>`<svg viewBox="0 0 ${s} ${s}"><circle cx="${s*.5}" cy="${s*.5}" r="${s*.5}" fill="${bg}"/><path d="M${s*.15},${s*.5} Q${s*.25},${s*.3} ${s*.35},${s*.5} Q${s*.4},${s*.6} ${s*.46},${s*.5} Q${s*.5},${s*.42} ${s*.54},${s*.5} L${s*.85},${s*.5}" fill="none" stroke="${fg}" stroke-width="${s*.025}" stroke-linecap="round"/></svg>`;
const FA=(s,bg,fg)=>`<svg viewBox="0 0 110 110" width="${s}"><rect width="110" height="110" rx="22" fill="${bg}"/><path d="M16.5,55 Q27.5,33 38.5,55 Q44,66 50.6,55 Q55,46 59.4,55 L93.5,55" fill="none" stroke="${fg}" stroke-width="2.2" stroke-linecap="round"/></svg>`;
const FS=(s,bg,fg)=>`<svg viewBox="0 0 110 110" width="${s}"><rect width="110" height="110" rx="22" fill="${bg}"/><path class="s1" d="M16.5,55 Q27.5,33 38.5,55" fill="none" stroke="${fg}" stroke-width="2.2" stroke-linecap="round"/><path class="s2" d="M38.5,55 Q44,66 50.6,55" fill="none" stroke="${fg}" stroke-width="2.2" stroke-linecap="round"/><path class="s3" d="M50.6,55 Q55,46 59.4,55" fill="none" stroke="${fg}" stroke-width="2.2" stroke-linecap="round"/><path class="s4" d="M59.4,55 L93.5,55" fill="none" stroke="${fg}" stroke-width="2.2" stroke-linecap="round"/></svg>`;
const wm=(ff,fw,ls,sz,t)=>`<div style="font-family:${ff};font-weight:${fw};letter-spacing:${ls};font-size:${sz};">${t}</div>`;

const typos=[
  {n:'Sora Light',f:"'Sora',sans-serif",w:'300',l:'.08em'},
];
const colors=[
  {bg:P.s,fg:P.c,n:'Sauge',bdr:''},{bg:P.c,fg:P.w,n:'Charbon',bdr:''},{bg:P.w,fg:P.c,n:'Blanc',bdr:'border:1px solid #e0e0e0;'},{bg:P.gc,fg:P.c,n:'Gris clair',bdr:''},{bg:P.g,fg:P.w,n:'Gris',bdr:''}
];

let h='';

// HERO
h+=`<div class="hero"><div style="width:90px;height:90px;margin:0 auto 24px;">${F(90,P.s,P.c)}</div><div style="font-family:'Sora',sans-serif;font-weight:300;font-size:44px;letter-spacing:.08em;color:${P.c};">faraday</div><div style="font-size:10px;letter-spacing:.28em;text-transform:uppercase;opacity:.35;margin-top:10px;">disconnect to reconnect</div></div>`;

// 01 LOGO
h+=`<div class="sect"><div class="sh">01</div><div class="st">Logo principal & declinaisons</div><div class="sd">Fond Sauge en principal, Charbon en declinaison. Carres arrondis et ronds.</div>`;
h+=`<div class="sub">Carres</div><div class="g">`;
colors.forEach(c=>{h+=`<div><div class="lc" style="width:130px;height:130px;background:${c.bg};${c.bdr}">${F(130,c.bg,c.fg)}</div><div class="ll">${c.n}</div></div>`;});
h+=`</div><div class="sub">Ronds</div><div class="g">`;
colors.forEach(c=>{h+=`<div><div class="lc" style="width:130px;height:130px;border-radius:50%;background:${c.bg};${c.bdr}">${FR(130,c.bg,c.fg)}</div><div class="ll">${c.n}</div></div>`;});
h+=`</div></div><div class="div"></div>`;

// 02 LOCKUPS — Sora lowercase only
h+=`<div class="sect"><div class="sh">02</div><div class="st">Lockups</div><div class="sd">Sora Light, minuscule. Avec et sans baseline, horizontal et empile.</div>`;
const t=typos[0];
// Avec baseline
h+=`<div class="sub">Avec baseline</div><div class="g" style="margin-bottom:16px;">`;
[{bg:P.s,fg:P.c},{bg:P.c,fg:P.w},{bg:P.w,fg:P.c,bdr:'border:1px solid #e0e0e0;'},{bg:P.gc,fg:P.c},{bg:P.g,fg:P.w}].forEach(c=>{
  h+=`<div class="lk" style="background:${c.bg};color:${c.fg};${c.bdr||''}"><div class="lk-i">${F(40,c.bg,c.fg)}</div><div>${wm(t.f,t.w,t.l,'20px','faraday')}<div class="lk-bl">disconnect to reconnect</div></div></div>`;
});
h+=`</div>`;
// Sans baseline
h+=`<div class="sub">Sans baseline</div><div class="g" style="margin-bottom:16px;">`;
[{bg:P.s,fg:P.c},{bg:P.c,fg:P.w},{bg:P.w,fg:P.c,bdr:'border:1px solid #e0e0e0;'},{bg:P.gc,fg:P.c}].forEach(c=>{
  h+=`<div class="lk" style="background:${c.bg};color:${c.fg};${c.bdr||''}"><div class="lk-i">${F(40,c.bg,c.fg)}</div>${wm(t.f,t.w,t.l,'20px','faraday')}</div>`;
});
h+=`</div>`;
// Rond
h+=`<div class="sub">Rond</div><div class="g" style="margin-bottom:16px;">`;
[{bg:P.s,fg:P.c},{bg:P.c,fg:P.w},{bg:P.w,fg:P.c,bdr:'border:1px solid #e0e0e0;'}].forEach(c=>{
  h+=`<div class="lk" style="background:${c.bg};color:${c.fg};${c.bdr||''}"><div class="lk-i r">${FR(40,c.bg,c.fg)}</div><div>${wm(t.f,t.w,t.l,'20px','faraday')}<div class="lk-bl">disconnect to reconnect</div></div></div>`;
});
h+=`</div>`;
// Empile
h+=`<div class="sub">Empile</div><div class="g">`;
[{bg:P.s,fg:P.c},{bg:P.c,fg:P.w},{bg:P.w,fg:P.c,bdr:'border:1px solid #e0e0e0;'},{bg:P.gc,fg:P.c}].forEach(c=>{
  h+=`<div class="lk-s" style="background:${c.bg};color:${c.fg};${c.bdr||''}"><div class="lk-si">${F(50,c.bg,c.fg)}</div><div style="text-align:center;">${wm(t.f,t.w,t.l,'20px','faraday')}<div class="lk-bl">disconnect to reconnect</div></div></div>`;
});
h+=`</div>`;
h+=`</div><div class="div"></div>`;

// 03 ANIMATIONS
h+=`<div class="sect"><div class="sh">03</div><div class="st">Animations — 10 variantes</div><div class="sd">CSS pures. Chaque animation porte un sens lie a l'experience.</div>`;
const anims=[
  {c:'a1',n:'Line Draw',d:'Trace'},
  {c:'a2',n:'Wave → Flat',d:'Splash screen'},
  {c:'a3',n:'Flat → Wave',d:'Fin de session'},
  {c:'a4',n:'Respiration',d:'Pendant session'},
  {c:'a5',n:'Draw + Glow',d:'Hero, keynote'},
  {c:'a6',n:'Micro Glitch',d:'Transition'},
  {c:'a7',n:'Segments',d:'Loading',seg:true},
  {c:'a8',n:'Scale In',d:'Notification'},
  {c:'a9',n:'Heartbeat',d:'Monitoring'},
  {c:'a10',n:'Morph ■↔●',d:'Transition forme'},
];
h+=`<div class="sub">Sur fond Sauge</div><div class="g">`;
anims.forEach(a=>{
  const svg = a.seg ? FS(120,P.s,P.c) : (a.c==='a2'?`<svg viewBox="0 0 110 110" width="120"><rect width="110" height="110" rx="22" fill="${P.s}"/><path d="M16.5,55 Q27.5,20 38.5,55 Q44,80 50.6,55 Q55,35 59.4,55 L93.5,55" fill="none" stroke="${P.c}" stroke-width="2.2" stroke-linecap="round"/></svg>`:a.c==='a3'?`<svg viewBox="0 0 110 110" width="120"><rect width="110" height="110" rx="22" fill="${P.s}"/><path d="M16.5,55 Q27.5,55 38.5,55 Q44,55 50.6,55 Q55,55 59.4,55 L93.5,55" fill="none" stroke="${P.c}" stroke-width="2.2" stroke-linecap="round"/></svg>`:FA(120,P.s,P.c));
  h+=`<div><div class="lc ${a.c}" style="width:120px;height:120px;background:${P.s};border-radius:24px;">${svg}</div><div class="ll">${a.n}<br><span style="opacity:.5;">${a.d}</span></div></div>`;
});
h+=`</div><div class="sub">Sur fond Charbon</div><div class="g">`;
anims.slice(0,5).forEach(a=>{
  const svg = a.seg ? FS(120,P.c,P.w) : (a.c==='a2'?`<svg viewBox="0 0 110 110" width="120"><rect width="110" height="110" rx="22" fill="${P.c}"/><path d="M16.5,55 Q27.5,20 38.5,55 Q44,80 50.6,55 Q55,35 59.4,55 L93.5,55" fill="none" stroke="${P.w}" stroke-width="2.2" stroke-linecap="round"/></svg>`:a.c==='a3'?`<svg viewBox="0 0 110 110" width="120"><rect width="110" height="110" rx="22" fill="${P.c}"/><path d="M16.5,55 Q27.5,55 38.5,55 Q44,55 50.6,55 Q55,55 59.4,55 L93.5,55" fill="none" stroke="${P.w}" stroke-width="2.2" stroke-linecap="round"/></svg>`:FA(120,P.c,P.w));
  h+=`<div><div class="lc ${a.c}" style="width:120px;height:120px;background:${P.c};border-radius:24px;">${svg}</div><div class="ll">${a.n}</div></div>`;
});
h+=`</div></div><div class="div"></div>`;

// 04 COULEURS
h+=`<div class="sect"><div class="sh">04</div><div class="st">Palette</div><div class="sd">Primaires pour le logo. Secondaires pour l'UI uniquement (CTA, liens, data). Jamais de secondaire dans le logo.</div>`;
h+=`<div class="sub">Primaires</div><div class="g gl">`;
[{n:'Sauge',h:P.s,r:'Fond principal logo',l:true},{n:'Charbon',h:P.c,r:'Texte, declinaison',l:false},{n:'Blanc',h:P.w,r:'Fond clair, app',l:true}].forEach(c=>{
  h+=`<div class="sw"><div class="sw-c" style="background:${c.h};${c.l?'border:1px solid #ddd;':''}"><span style="color:${c.l?P.c:P.w};font-size:9px;font-weight:600;">${c.n}</span></div><div class="sw-inf"><div class="sw-n">${c.n}</div><div class="sw-h">${c.h}</div><div class="sw-r">${c.r}</div></div></div>`;
});
h+=`</div><div class="sub">Secondaires — UI uniquement</div><div class="g gl">`;
[{n:'Corail',h:P.co,r:'CTA secondaire, gamification'},{n:'Bleu',h:P.bl,r:'Liens, data, analytics'}].forEach(c=>{
  h+=`<div class="sw"><div class="sw-c" style="background:${c.h};"><span style="color:#fff;font-size:9px;font-weight:600;">${c.n}</span></div><div class="sw-inf"><div class="sw-n">${c.n}</div><div class="sw-h">${c.h}</div><div class="sw-r">${c.r}</div></div></div>`;
});
h+=`</div><div class="sub">Gris</div><div class="g gl">`;
[{n:'Gris',h:P.g,r:'Texte secondaire'},{n:'Gris Clair',h:P.gc,r:'Bordures, separateurs',l:true}].forEach(c=>{
  h+=`<div class="sw"><div class="sw-c" style="background:${c.h};${c.l?'border:1px solid #c8c0c0;':''}"><span style="color:${c.l?P.c:'#fff'};font-size:9px;font-weight:600;">${c.n}</span></div><div class="sw-inf"><div class="sw-n">${c.n}</div><div class="sw-h">${c.h}</div><div class="sw-r">${c.r}</div></div></div>`;
});
h+=`</div></div><div class="div"></div>`;

// 05 TYPO
h+=`<div class="sect"><div class="sh">05</div><div class="st">Typographie</div><div class="sd">Sora pour la marque, Inter pour le corps, Space Mono pour les donnees.</div>`;
h+=`<div class="sub">Sora — Display / Marque</div><div style="font-family:'Sora',sans-serif;font-weight:300;font-size:36px;letter-spacing:.08em;margin-bottom:6px;">faraday</div><div style="font-family:'Sora',sans-serif;font-weight:300;font-size:20px;letter-spacing:.06em;color:${P.g};">The present starts here</div><div style="font-family:'Sora',sans-serif;font-size:12px;margin-top:10px;color:${P.g};">Light 300 · Regular 400 · Medium 500</div>`;
h+=`<div class="sub" style="margin-top:28px;">Inter — Corps / Interface</div><div style="font-size:16px;margin-bottom:6px;">Deposez votre telephone. Reprenez votre temps.</div><div style="font-size:13px;line-height:1.7;max-width:480px;color:${P.g};">La Faraday Box est un objet connecte dans lequel les utilisateurs deposent leur telephone afin de creer une boucle positive de deconnexion volontaire.</div>`;
h+=`<div class="sub" style="margin-top:28px;">Space Mono — Donnees / Stats</div><div style="font-family:'Space Mono',monospace;font-size:28px;font-weight:700;">9h46 <span style="font-size:14px;font-weight:400;color:${P.g};">aujourd'hui</span></div>`;
h+=`</div><div class="div"></div>`;

// 06 FAVICONS
h+=`<div class="sect"><div class="sh">06</div><div class="st">Favicon & App Icon</div><div class="sd">Le symbole reste lisible de 16px a 512px.</div><div class="g" style="align-items:flex-end;">`;
